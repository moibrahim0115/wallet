<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>محفظتي | Smart Wallet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ========== CSS Variables ========== */
        :root {
            --primary: #6366F1;
            --primary-light: #818CF8;
            --secondary: #EC4899;
            --secondary-light: #F472B6;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
            --bg-dark: #0F172A;
            --surface: #1E293B;
            --surface-light: #334155;
            --text: #F1F5F9;
            --text-muted: #94A3B8;
            --border: rgba(255, 255, 255, 0.1);
            --radius: 1rem;
            --radius-lg: 1.5rem;
            --shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        /* ========== Reset & Base ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1E1B4B 50%, #0F172A 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* ========== Background Effects ========== */
        .bg-effects {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
            z-index: 0;
        }

        .bg-effects::before {
            content: '';
            position: absolute;
            top: -10rem;
            right: -10rem;
            width: 20rem;
            height: 20rem;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 50%;
            filter: blur(4rem);
            animation: float 8s ease-in-out infinite;
        }

        .bg-effects::after {
            content: '';
            position: absolute;
            bottom: -10rem;
            left: -10rem;
            width: 25rem;
            height: 25rem;
            background: rgba(236, 72, 153, 0.15);
            border-radius: 50%;
            filter: blur(4rem);
            animation: float 10s ease-in-out infinite reverse;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-2rem) scale(1.1); }
        }

        /* ========== Container ========== */
        .container {
            position: relative;
            z-index: 1;
            max-width: 28rem;
            margin: 0 auto;
            padding: 1.5rem;
            padding-bottom: 6rem;
        }

        /* ========== Header ========== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-1rem); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 800;
        }

        .header p {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .header-actions {
            display: flex;
            gap: 0.75rem;
            align-items: center;
        }

        .icon-btn {
            position: relative;
            width: 2.5rem;
            height: 2.5rem;
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        .icon-btn .badge {
            position: absolute;
            top: -0.25rem;
            right: -0.25rem;
            width: 1rem;
            height: 1rem;
            background: var(--secondary);
            border-radius: 50%;
            font-size: 0.625rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .icon-btn.danger:hover {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
            border-color: var(--danger);
        }

        .avatar {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--primary), #9333EA);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .avatar:hover {
            transform: scale(1.05);
        }

        /* ========== Hero Card ========== */
        .hero-card {
            position: relative;
            background: linear-gradient(135deg, var(--primary) 0%, #9333EA 50%, var(--secondary) 100%);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            overflow: hidden;
            box-shadow: var(--shadow);
            animation: scaleIn 0.5s ease-out;
        }

        @keyframes scaleIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .hero-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg width='40' height='40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0h40v40H0z' fill='none'/%3E%3Cpath d='M0 40L40 0' stroke='%23fff' stroke-opacity='0.1'/%3E%3C/svg%3E");
            opacity: 0.3;
        }

        .hero-card-content {
            position: relative;
            z-index: 1;
        }

        .hero-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            opacity: 0.8;
            margin-bottom: 0.5rem;
        }

        .hero-balance {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            font-variant-numeric: tabular-nums;
        }

        .hero-stats {
            display: flex;
            gap: 1.5rem;
        }

        .hero-stat {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .hero-stat-icon {
            width: 1.75rem;
            height: 1.75rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hero-stat-label {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .hero-stat-value {
            font-size: 0.875rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        /* ========== Stats Grid ========== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(1rem);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.5s ease-out backwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0.1s; }
        .stat-card:nth-child(2) { animation-delay: 0.2s; }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(1rem); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.5rem;
        }

        .stat-icon {
            width: 2.25rem;
            height: 2.25rem;
            border-radius: 0.75rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stat-change {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .stat-change.positive {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success);
        }

        .stat-change.negative {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .stat-glow {
            position: absolute;
            bottom: -2rem;
            right: -2rem;
            width: 6rem;
            height: 6rem;
            border-radius: 50%;
            filter: blur(3rem);
            opacity: 0.2;
        }

        /* ========== Tabs ========== */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .tab {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.625rem 1rem;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
        }

        .tab:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        .tab.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
        }

        /* ========== Section ========== */
        .section {
            margin-bottom: 1.5rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .section-title {
            font-size: 0.875rem;
            font-weight: 700;
        }

        .section-link {
            font-size: 0.75rem;
            color: var(--primary-light);
            text-decoration: none;
            cursor: pointer;
            transition: color 0.3s;
            background: none;
            border: none;
            font-family: inherit;
        }

        .section-link:hover {
            color: var(--primary);
        }

        .section-link.danger {
            color: var(--danger);
        }

        /* ========== Card ========== */
        .card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(1rem);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .card-body {
            padding: 1rem;
        }

        /* ========== Empty State ========== */
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 0.875rem;
        }

        /* ========== Chart Container ========== */
        .chart-container {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .pie-chart {
            width: 8rem;
            height: 8rem;
            position: relative;
        }

        .pie-chart svg {
            transform: rotate(-90deg);
        }

        .pie-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .pie-center-value {
            font-size: 1rem;
            font-weight: 700;
        }

        .pie-center-label {
            font-size: 0.625rem;
            color: var(--text-muted);
        }

        .chart-legend {
            flex: 1;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .legend-dot {
            width: 0.625rem;
            height: 0.625rem;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .legend-name {
            flex: 1;
            font-size: 0.75rem;
            color: var(--text-muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .legend-value {
            font-size: 0.75rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        /* ========== Transaction List ========== */
        .transaction-list {
            max-height: 20rem;
            overflow-y: auto;
        }

        .transaction-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem;
            border-radius: var(--radius);
            cursor: pointer;
            transition: background 0.3s;
            position: relative;
        }

        .transaction-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .transaction-delete {
            position: absolute;
            left: 0.5rem;
            width: 1.75rem;
            height: 1.75rem;
            border-radius: 0.5rem;
            background: rgba(239, 68, 68, 0.2);
            border: none;
            color: var(--danger);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .transaction-item:hover .transaction-delete {
            opacity: 1;
        }

        .transaction-icon {
            width: 2.25rem;
            height: 2.25rem;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .transaction-info {
            flex: 1;
            min-width: 0;
        }

        .transaction-name {
            font-size: 0.875rem;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .transaction-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .transaction-amount {
            text-align: left;
            flex-shrink: 0;
            margin-right: 1.5rem;
        }

        .transaction-value {
            font-size: 0.875rem;
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .transaction-value.income {
            color: var(--success);
        }

        .transaction-category {
            font-size: 0.625rem;
            color: var(--text-muted);
        }

        .transaction-arrow {
            color: var(--text-muted);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .transaction-item:hover .transaction-arrow {
            opacity: 1;
        }

        /* ========== Budget Card ========== */
        .budget-card {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(1rem);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-bottom: 0.75rem;
            transition: border-color 0.3s;
        }

        .budget-card:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        .progress-ring {
            position: relative;
            width: 4.5rem;
            height: 4.5rem;
        }

        .progress-ring svg {
            transform: rotate(-90deg);
        }

        .progress-ring-bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.1);
        }

        .progress-ring-fill {
            fill: none;
            stroke-linecap: round;
            transition: stroke-dashoffset 1s ease-out;
        }

        .progress-ring-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.875rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }

        .budget-info {
            flex: 1;
        }

        .budget-header {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
        }

        .budget-name {
            font-size: 0.875rem;
            font-weight: 500;
        }

        .budget-badge {
            padding: 0.125rem 0.375rem;
            border-radius: 9999px;
            font-size: 0.625rem;
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger);
        }

        .budget-spent {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.25rem;
        }

        .budget-remaining {
            font-size: 0.75rem;
            font-weight: 600;
        }

        .budget-remaining.positive {
            color: var(--success);
        }

        .budget-remaining.negative {
            color: var(--danger);
        }

        /* ========== Insight Card ========== */
        .insight-card {
            display: flex;
            gap: 0.75rem;
            padding: 1rem;
            border-radius: var(--radius);
            margin-bottom: 0.75rem;
        }

        .insight-card.warning {
            background: rgba(245, 158, 11, 0.1);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .insight-card.tip {
            background: rgba(59, 130, 246, 0.1);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }

        .insight-card.achievement {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .insight-card.prediction {
            background: rgba(139, 92, 246, 0.1);
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .insight-icon {
            width: 2rem;
            height: 2rem;
            border-radius: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .insight-card.warning .insight-icon { color: var(--warning); }
        .insight-card.tip .insight-icon { color: #3B82F6; }
        .insight-card.achievement .insight-icon { color: var(--success); }
        .insight-card.prediction .insight-icon { color: #8B5CF6; }

        .insight-content {
            flex: 1;
        }

        .insight-title {
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .insight-message {
            font-size: 0.75rem;
            color: var(--text-muted);
            line-height: 1.5;
        }

        /* ========== Add Button ========== */
        .add-btn {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            width: 3.5rem;
            height: 3.5rem;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--primary), #9333EA);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 50;
            transition: all 0.3s;
        }

        .add-btn:hover {
            transform: translateX(-50%) scale(1.05);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.5);
        }

        .add-btn:active {
            transform: translateX(-50%) scale(0.95);
        }

        /* ========== Modal ========== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(0.5rem);
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to bottom, var(--surface), var(--bg-dark));
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 1.5rem;
            z-index: 101;
            transform: translateY(100%);
            transition: transform 0.3s ease-out;
            max-width: 28rem;
            margin: 0 auto;
        }

        .modal-overlay.active .modal {
            transform: translateY(0);
        }

        .modal-handle {
            width: 3rem;
            height: 0.25rem;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 9999px;
            margin: 0 auto 1.5rem;
        }

        .modal-title {
            font-size: 1.125rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 1rem;
        }

        .amount-input {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            text-align: center;
            margin-bottom: 1rem;
        }

        .amount-input input {
            background: transparent;
            border: none;
            color: white;
            font-size: 1.75rem;
            font-weight: 700;
            text-align: center;
            width: 100%;
            font-family: 'Cairo', sans-serif;
            font-variant-numeric: tabular-nums;
        }

        .amount-input input:focus {
            outline: none;
        }

        .amount-input span {
            color: var(--text-muted);
            font-size: 1rem;
        }

        .type-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .type-btn {
            flex: 1;
            padding: 0.75rem;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
            font-family: 'Cairo', sans-serif;
        }

        .type-btn.active {
            background: rgba(236, 72, 153, 0.2);
            border-color: rgba(236, 72, 153, 0.3);
            color: var(--secondary);
        }

        .category-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .category-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 0.75rem;
            border-radius: var(--radius);
            font-size: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        .category-btn:hover,
        .category-btn.active {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .desc-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: var(--radius);
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: white;
            font-size: 0.875rem;
            font-family: 'Cairo', sans-serif;
            margin-bottom: 1rem;
        }

        .desc-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            border-radius: var(--radius);
            background: linear-gradient(135deg, var(--primary), #9333EA);
            border: none;
            color: white;
            font-size: 0.875rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
            transition: box-shadow 0.3s;
            font-family: 'Cairo', sans-serif;
        }

        .submit-btn:hover {
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.4);
        }

        .submit-btn.danger {
            background: linear-gradient(135deg, var(--danger), #DC2626);
            box-shadow: 0 10px 25px rgba(239, 68, 68, 0.3);
        }

        /* ========== Confirm Modal ========== */
        .confirm-modal {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.9);
            background: var(--surface);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            z-index: 102;
            width: 90%;
            max-width: 20rem;
            text-align: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .confirm-modal.active {
            opacity: 1;
            visibility: visible;
            transform: translate(-50%, -50%) scale(1);
        }

        .confirm-modal-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .confirm-modal-title {
            font-size: 1.125rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .confirm-modal-text {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 1.5rem;
        }

        .confirm-modal-buttons {
            display: flex;
            gap: 0.75rem;
        }

        .confirm-btn {
            flex: 1;
            padding: 0.75rem;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Cairo', sans-serif;
            border: none;
        }

        .confirm-btn.cancel {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-muted);
        }

        .confirm-btn.confirm {
            background: var(--danger);
            color: white;
        }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            bottom: 5rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.75rem 1.5rem;
            z-index: 200;
            font-size: 0.875rem;
            opacity: 0;
            transition: all 0.3s;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.success {
            border-color: var(--success);
            color: var(--success);
        }

        .toast.error {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* ========== Tab Content ========== */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(0.5rem); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ========== Scrollbar ========== */
        ::-webkit-scrollbar {
            width: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
        }

        /* ========== Responsive ========== */
        @media (max-width: 360px) {
            .hero-balance {
                font-size: 2rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Background Effects -->
    <div class="bg-effects"></div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Main Container -->
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div>
                <h1>محفظتي</h1>

            </div>
            <div class="header-actions">
                <button class="icon-btn danger" onclick="showClearConfirm()" title="مسح كل البيانات">

                        <polyline points="3 6 5 6 21 6"/>

                <button class="icon-btn" onclick="exportData()" title="تصدير البيانات">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        <!-- Hero Card -->
        <div class="hero-card">

                    <div class="hero-stat">
                        <div class="hero-stat-icon">

                                <polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/>

        </div>

        <!-- Quick Stats -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon" style="background: rgba(16, 185, 129, 0.2);">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <circle cx="12" cy="12" r="6"/>
                            <circle cx="12" cy="12" r="2"/>
                        </svg>
                    </div>
                </div>
                <div class="stat-label">معدل التوفير</div>
                <div class="stat-value" id="savingsRate">0%</div>
                <div class="stat-glow" style="background: #10B981;"></div>
            </div>
            <div class="stat-card">
                <div class="stat-header">
                    <div class="stat-icon" style="background: rgba(99, 102, 241, 0.2);">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#6366F1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                            <line x1="1" y1="10" x2="23" y2="10"/>
                        </svg>

        <!-- Tabs -->
        <div class="tabs">
            <button class="tab active" data-tab="overview">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

                نظرة عامة

            <button class="tab" data-tab="analytics">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>

            <button class="tab" data-tab="budgets">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <circle cx="12" cy="12" r="6"/>

        <!-- Tab Contents -->
        <div id="tab-overview" class="tab-content active">
            <!-- Spending Chart -->
            <div class="section">
                <div class="card">
                    <div class="card-header">
                        <span class="section-title">توزيع المصاريف</span>

                            <!-- Populated by JS -->

            <!-- Recent Transactions -->

            <div class="section">

                            <line x1="12" y1="5" x2="12" y2="19"/>
                            <line x1="5" y1="12" x2="19" y2="12"/>

                        ضيف ميزانية

                <div id="budgetsList">

    <!-- Add Button -->
    <button class="add-btn" onclick="openModal()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>

    </button>

    <!-- Add Transaction Modal -->
    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <h3 class="modal-title">ضيف عملية جديدة</h3>
            
            <div class="amount-input">
                <input type="text" id="amountInput" placeholder="0.00" oninput="formatAmount(this)">
                <span>ج.م</span>
            </div>
            
            <div class="type-buttons">
                <button class="type-btn active" id="expenseBtn" onclick="setType('expense')">مصروف</button>
                <button class="type-btn" id="incomeBtn" onclick="setType('income')">دخل</button>
            </div>
            
            <div class="category-buttons" id="categoryButtons">
                <!-- Populated by JS -->
            </div>

    <!-- Budget Modal -->
    <div class="modal-overlay" id="budgetModalOverlay" onclick="closeBudgetModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-handle"></div>
            <h3 class="modal-title">ضيف ميزانية جديدة</h3>
            
            <div class="category-buttons" id="budgetCategoryButtons" style="margin-bottom: 1rem;">
                <!-- Populated by JS -->
            </div>
            
            <div class="amount-input">
                <input type="text" id="budgetLimitInput" placeholder="0.00" oninput="formatAmount(this)">
                <span>ج.م</span>
            </div>
            
            <button class="submit-btn" onclick="addBudget()">احفظ الميزانية</button>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div class="modal-overlay" id="confirmModalOverlay">
        <div class="confirm-modal" id="confirmModal">
            <div class="confirm-modal-icon">⚠️</div>
            <div class="confirm-modal-title">مسح كل البيانات؟</div>
            <div class="confirm-modal-text">كل العمليات والميزانيات هتمسح نهائياً. متقدرش ترجعها تاني!</div>
            <div class="confirm-modal-buttons">
                <button class="confirm-btn cancel" onclick="hideClearConfirm()">إلغاء</button>
                <button class="confirm-btn confirm" onclick="clearAllData()">امسح كل حاجة</button>
            </div>
        </div>
    </div>

    <script>
        // ========== Categories ==========
        const categories = [
            { id: 'food', name: 'أكل ومطاعم', icon: '🍽️', color: '#F59E0B', type: 'expense' },
            { id: 'transport', name: 'مواصلات', icon: '🚗', color: '#3B82F6', type: 'expense' },
            { id: 'shopping', name: 'شوبينج', icon: '🛍️', color: '#EC4899', type: 'expense' },
            { id: 'entertainment', name: 'فسحة وترفيه', icon: '🎮', color: '#8B5CF6', type: 'expense' },
            { id: 'bills', name: 'فواتير', icon: '📄', color: '#EF4444', type: 'expense' },
            { id: 'health', name: 'صحة', icon: '❤️', color: '#10B981', type: 'expense' },
            { id: 'salary', name: 'مرتب', icon: '💰', color: '#10B981', type: 'income' },
            { id: 'freelance', name: 'فري لانسر', icon: '💻', color: '#6366F1', type: 'income' },
            { id: 'gift', name: 'هدية', icon: '🎁', color: '#EC4899', type: 'income' },
        ];

        // ========== State ==========
        let transactions = [];
        let budgets = [];
        let selectedType = 'expense';
        let selectedCategory = 'food';
        let selectedBudgetCategory = 'food';

        // ========== LocalStorage Functions ==========
        const STORAGE_KEYS = {
            transactions: 'wallet_transactions',
            budgets: 'wallet_budgets'
        };

        function saveTransactions() {
            localStorage.setItem(STORAGE_KEYS.transactions, JSON.stringify(transactions));
        }

        function saveBudgets() {
            localStorage.setItem(STORAGE_KEYS.budgets, JSON.stringify(budgets));
        }

        function loadTransactions() {
            const data = localStorage.getItem(STORAGE_KEYS.transactions);
            if (data) {
                transactions = JSON.parse(data);
                // Convert date strings back to Date objects
                transactions = transactions.map(t => ({
                    ...t,
                    date: new Date(t.date)
                }));
            }
        }

        function loadBudgets() {
            const data = localStorage.getItem(STORAGE_KEYS.budgets);
            if (data) {
                budgets = JSON.parse(data);
            }
        }

        // ========== Utility Functions ==========
        function formatCurrency(amount) {
            return new Intl.NumberFormat('ar-EG').format(amount) + ' ج.م';
        }

        function getRelativeTime(date) {
            const now = new Date();
            const diff = now - new Date(date);
            const mins = Math.floor(diff / 60000);
            const hours = Math.floor(mins / 60);
            const days = Math.floor(hours / 24);

            if (mins < 1) return 'دلوقتي';
            if (mins < 60) return `منذ ${mins} دقيقة`;
            if (hours < 24) return `منذ ${hours} ساعة`;
            if (days === 1) return 'امبارح';
            if (days < 7) return `منذ ${days} أيام`;
            return new Date(date).toLocaleDateString('ar-EG', { month: 'short', day: 'numeric' });
        }

        function getCategory(id) {
            return categories.find(c => c.id === id) || categories[0];
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // ========== Render Functions ==========
        function renderStats() {
            const totalIncome = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            const totalExpenses = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            const balance = totalIncome - totalExpenses;
            const savingsRate = totalIncome > 0 ? ((totalIncome - totalExpenses) / totalIncome * 100).toFixed(1) : 0;

            document.getElementById('balance').textContent = formatCurrency(Math.abs(balance)) + (balance < 0 ? ' (عليك)' : '');
            document.getElementById('totalIncome').textContent = formatCurrency(totalIncome);
            document.getElementById('totalExpenses').textContent = formatCurrency(totalExpenses);
            document.getElementById('savingsRate').textContent = savingsRate + '%';
            document.getElementById('transactionCount').textContent = transactions.length;
        }

        function renderChart() {
            const container = document.getElementById('chartContainer');
            const expenses = transactions.filter(t => t.type === 'expense');
            
            if (expenses.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📊</div>
                        <div class="empty-state-text">مفيش مصاريف لسه</div>
                    </div>
                `;
                return;
            }

            const byCategory = {};
            expenses.forEach(t => {
                byCategory[t.category] = (byCategory[t.category] || 0) + t.amount;
            });

            const total = Object.values(byCategory).reduce((s, v) => s + v, 0);
            const sorted = Object.entries(byCategory).sort((a, b) => b[1] - a[1]).slice(0, 4);

            // Calculate pie segments
            let offset = 0;
            const circumference = 2 * Math.PI * 40;
            const segments = sorted.map(([catId, amount]) => {
                const cat = getCategory(catId);
                const percentage = (amount / total) * 100;
                const dashLength = (percentage / 100) * circumference;
                const segment = {
                    color: cat.color,
                    dashArray: `${dashLength} ${circumference}`,
                    dashOffset: -offset
                };
                offset += dashLength;
                return { segment, cat, amount };
            });

            container.innerHTML = `
                <div class="pie-chart">
                    <svg viewBox="0 0 100 100" width="100%" height="100%">
                        <circle cx="50" cy="50" r="40" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="15"/>
                        ${segments.map(s => `
                            <circle cx="50" cy="50" r="40" fill="none" 
                                stroke="${s.segment.color}" 
                                stroke-width="15"
                                stroke-dasharray="${s.segment.dashArray}"
                                stroke-dashoffset="${s.segment.dashOffset}"/>
                        `).join('')}
                    </svg>
                    <div class="pie-center">
                        <span class="pie-center-value">${new Intl.NumberFormat('ar-EG').format(total)}</span>
                        <span class="pie-center-label">ج.م</span>
                    </div>
                </div>
                <div class="chart-legend">
                    ${sorted.map(([catId, amount]) => {
                        const cat = getCategory(catId);
                        return `
                            <div class="legend-item">
                                <div class="legend-dot" style="background: ${cat.color}"></div>
                                <span class="legend-name">${cat.name}</span>
                                <span class="legend-value">${formatCurrency(amount)}</span>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function renderTransactions() {
            const list = document.getElementById('transactionList');
            
            if (transactions.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">💳</div>
                        <div class="empty-state-text">مفيش عمليات لسه</div>
                    </div>
                `;
                return;
            }

            const sorted = [...transactions].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 10);
            
            list.innerHTML = sorted.map(t => {
                const cat = getCategory(t.category);
                return `
                    <div class="transaction-item">
                        <button class="transaction-delete" onclick="deleteTransaction(${t.id})" title="مسح">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="18" y1="6" x2="6" y2="18"/>
                                <line x1="6" y1="6" x2="18" y2="18"/>
                            </svg>
                        </button>
                        <div class="transaction-icon" style="background: ${cat.color}20;">
                            <span style="font-size: 1rem;">${cat.icon}</span>
                        </div>
                        <div class="transaction-info">
                            <div class="transaction-name">${t.description || cat.name}</div>
                            <div class="transaction-time">${getRelativeTime(t.date)}</div>
                        </div>
                        <div class="transaction-amount">
                            <div class="transaction-value ${t.type === 'income' ? 'income' : ''}">${t.type === 'income' ? '+' : '-'}${formatCurrency(t.amount)}</div>
                            <div class="transaction-category">${cat.name}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderInsights() {
            const list = document.getElementById('insightsList');
            
            // Generate dynamic insights based on data
            const insights = [];
            
            const totalExpenses = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            const totalIncome = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            
            // Check budgets
            budgets.forEach(b => {
                const progress = (b.spent / b.limit) * 100;
                if (progress > 100) {
                    const cat = getCategory(b.categoryId);
                    insights.push({
                        type: 'warning',
                        title: 'تجاوزت الميزانية!',
                        message: `يا صاحبي، بتتصرف أكتر من اللازم في ${cat.name} (${Math.round(progress)}%)! خف شوية.`
                    });
                } else if (progress > 80) {
                    const cat = getCategory(b.categoryId);
                    insights.push({
                        type: 'warning',
                        title: 'اقتربت من الحد',
                        message: `قربت تخلص ميزانية ${cat.name} (${Math.round(progress)}%). خلي بالك!`
                    });
                }
            });

            // Savings tip
            if (totalIncome > 0) {
                const savingsRate = ((totalIncome - totalExpenses) / totalIncome) * 100;
                if (savingsRate > 20) {
                    insights.push({
                        type: 'achievement',
                        title: 'عاش يا بطل! 🎉',
                        message: `وفرت ${savingsRate.toFixed(0)}% من فلوسك! استمر كده.`
                    });
                } else if (savingsRate < 0) {
                    insights.push({
                        type: 'tip',
                        title: 'نصيحة توفير',
                        message: 'بتصرف أكتر من اللي جيلك! حاول تقلل المصاريف الزيادة.'
                    });
                }
            }

            // Default insight if no data
            if (insights.length === 0) {
                insights.push({
                    type: 'tip',
                    title: 'ابدأ التتبع',
                    message: 'ضيف مصاريفك عشان نديك نصايح ذكية!'
                });
            }

            const icons = {
                warning: '⚠️',
                tip: '💡',
                achievement: '🏆',
                prediction: '📊'
            };

            list.innerHTML = insights.slice(0, 4).map(i => `
                <div class="insight-card ${i.type}">
                    <div class="insight-icon">${icons[i.type]}</div>
                    <div class="insight-content">
                        <div class="insight-title">${i.title}</div>
                        <div class="insight-message">${i.message}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderBudgets() {
            const list = document.getElementById('budgetsList');
            
            if (budgets.length === 0) {
                list.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">🎯</div>
                        <div class="empty-state-text">مفيش ميزانيات لسه</div>
                    </div>
                `;
                return;
            }

            list.innerHTML = budgets.map(b => {
                const cat = getCategory(b.categoryId);
                const progress = Math.min((b.spent / b.limit) * 100, 100);
                const isOver = b.spent > b.limit;
                const remaining = b.limit - b.spent;
                const circumference = 2 * Math.PI * 35;
                const offset = circumference - (progress / 100) * circumference;

                return `
                    <div class="budget-card">
                        <div class="progress-ring">
                            <svg viewBox="0 0 100 100" width="100%" height="100%">
                                <circle class="progress-ring-bg" cx="50" cy="50" r="35" stroke-width="8"/>
                                <circle class="progress-ring-fill" cx="50" cy="50" r="35" stroke-width="8" 
                                    stroke="${isOver ? '#EF4444' : cat.color}"
                                    stroke-dasharray="${circumference}"
                                    stroke-dashoffset="${offset}"/>
                            </svg>
                            <div class="progress-ring-text">${Math.round(progress)}%</div>
                        </div>
                        <div class="budget-info">
                            <div class="budget-header">
                                <span class="budget-name">${cat.icon} ${cat.name}</span>
                                ${isOver ? '<span class="budget-badge">عليك</span>' : ''}
                            </div>
                            <div class="budget-spent">صرفت ${formatCurrency(b.spent)} من ${formatCurrency(b.limit)}</div>
                            <div class="budget-remaining ${isOver ? 'negative' : 'positive'}">
                                ${isOver ? 'عليك ' + formatCurrency(Math.abs(remaining)) : 'مضي ' + formatCurrency(remaining)}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderCategoryButtons() {
            const container = document.getElementById('categoryButtons');
            const filtered = categories.filter(c => c.type === selectedType);
            
            container.innerHTML = filtered.map(c => `
                <button class="category-btn ${c.id === selectedCategory ? 'active' : ''}" onclick="selectCategory('${c.id}')">
                    <span>${c.icon}</span>
                    <span>${c.name}</span>
                </button>
            `).join('');
        }

        function renderBudgetCategoryButtons() {
            const container = document.getElementById('budgetCategoryButtons');
            const filtered = categories.filter(c => c.type === 'expense');
            
            container.innerHTML = filtered.map(c => `
                <button class="category-btn ${c.id === selectedBudgetCategory ? 'active' : ''}" onclick="selectBudgetCategory('${c.id}')">
                    <span>${c.icon}</span>
                    <span>${c.name}</span>
                </button>
            `).join('');
        }

        // ========== Modal Functions ==========
        function openModal() {
            document.getElementById('modalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal(e) {
            if (e.target === document.getElementById('modalOverlay')) {
                document.getElementById('modalOverlay').classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        function openBudgetModal() {
            document.getElementById('budgetModalOverlay').classList.add('active');
            document.body.style.overflow = 'hidden';
            renderBudgetCategoryButtons();
        }

        function closeBudgetModal(e) {
            if (e.target === document.getElementById('budgetModalOverlay')) {
                document.getElementById('budgetModalOverlay').classList.remove('active');
                document.body.style.overflow = '';
            }
        }

        function setType(type) {
            selectedType = type;
            document.getElementById('expenseBtn').classList.toggle('active', type === 'expense');
            document.getElementById('incomeBtn').classList.toggle('active', type === 'income');
            selectedCategory = categories.find(c => c.type === type)?.id || 'food';
            renderCategoryButtons();
        }

        function selectCategory(id) {
            selectedCategory = id;
            renderCategoryButtons();
        }

        function selectBudgetCategory(id) {
            selectedBudgetCategory = id;
            renderBudgetCategoryButtons();
        }

        function formatAmount(input) {
            let value = input.value.replace(/[^\d.]/g, '');
            input.value = value;
        }

        // ========== CRUD Functions ==========
        function addTransaction() {
            const amount = parseFloat(document.getElementById('amountInput').value) || 0;
            const description = document.getElementById('descInput').value;

            if (amount <= 0) {
                showToast('لو سمحت دخّل مبلغ صحيح', 'error');
                return;
            }

            const newTransaction = {
                id: Date.now(),
                amount,
                category: selectedCategory,
                description: description || getCategory(selectedCategory).name,
                date: new Date(),
                type: selectedType
            };

            transactions.unshift(newTransaction);
            
            // Update budget if expense
            if (selectedType === 'expense') {
                const budget = budgets.find(b => b.categoryId === selectedCategory);
                if (budget) {
                    budget.spent += amount;
                    saveBudgets();
                }
            }

            saveTransactions();
            renderAll();

            // Close modal & reset
            document.getElementById('modalOverlay').classList.remove('active');
            document.body.style.overflow = '';
            document.getElementById('amountInput').value = '';
            document.getElementById('descInput').value = '';

            showToast('تم حفظ العملية بنجاح! ✅');
        }

        function deleteTransaction(id) {
            const t = transactions.find(t => t.id === id);
            if (t && t.type === 'expense') {
                const budget = budgets.find(b => b.categoryId === t.category);
                if (budget) {
                    budget.spent = Math.max(0, budget.spent - t.amount);
                    saveBudgets();
                }
            }
            
            transactions = transactions.filter(t => t.id !== id);
            saveTransactions();
            renderAll();
            showToast('تم مسح العملية');
        }

        function addBudget() {
            const limit = parseFloat(document.getElementById('budgetLimitInput').value) || 0;

            if (limit <= 0) {
                showToast('لو سمحت دخّل مبلغ صحيح', 'error');
                return;
            }

            // Check if budget exists
            const existing = budgets.find(b => b.categoryId === selectedBudgetCategory);
            if (existing) {
                existing.limit = limit;
            } else {
                budgets.push({
                    categoryId: selectedBudgetCategory,
                    limit,
                    spent: 0
                });
            }

            saveBudgets();
            renderBudgets();

            // Close modal & reset
            document.getElementById('budgetModalOverlay').classList.remove('active');
            document.body.style.overflow = '';
            document.getElementById('budgetLimitInput').value = '';

            showToast('تم حفظ الميزانية! 🎯');
        }

        // ========== Clear Data Functions ==========
        function showClearConfirm() {
            document.getElementById('confirmModalOverlay').classList.add('active');
            document.getElementById('confirmModal').classList.add('active');
        }

        function hideClearConfirm() {
            document.getElementById('confirmModalOverlay').classList.remove('active');
            document.getElementById('confirmModal').classList.remove('active');
        }

        function clearAllData() {
            localStorage.removeItem(STORAGE_KEYS.transactions);
            localStorage.removeItem(STORAGE_KEYS.budgets);
            transactions = [];
            budgets = [];
            renderAll();
            hideClearConfirm();
            showToast('تم مسح كل البيانات');
        }

        // ========== Export/Import Functions ==========
        function exportData() {
            const data = {
                transactions,
                budgets,
                exportDate: new Date().toISOString()
            };
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `wallet-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
            
            showToast('تم تصدير البيانات! 📁');
        }

        // ========== Tab Switching ==========
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
            });
        });

        // ========== Render All ==========
        function renderAll() {
            renderStats();
            renderChart();
            renderTransactions();
            renderInsights();
            renderBudgets();
        }

        // ========== Initialize ==========
        function init() {
            loadTransactions();
            loadBudgets();
            renderAll();
            renderCategoryButtons();
        }

        init();
    </script>
</body>
</html>
