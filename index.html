<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark" data-lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Fulus</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════
   DARK THEME (default)
═══════════════════════════════════ */
:root,[data-theme="dark"]{
  --bg:       #080a0f;
  --s1:       #0d1018;
  --s2:       #12151f;
  --s3:       #181c28;
  --s4:       #1e2235;
  --border:   rgba(255,255,255,.07);
  --border2:  rgba(255,255,255,.13);
  --border3:  rgba(255,255,255,.20);
  --shadow:   rgba(0,0,0,.6);
  --shadow2:  rgba(0,0,0,.3);

  --hero-bg:  linear-gradient(160deg,#12192f 0%,#0c1020 40%,#141028 100%);
  --hero-bd:  rgba(79,142,255,.2);
  --hero-streak: linear-gradient(90deg,transparent 0%,rgba(79,142,255,.5) 40%,rgba(201,168,76,.4) 70%,transparent 100%);
  --nav-bg:   rgba(13,16,24,.9);

  --blue:     #4f8eff;
  --blue2:    #7bb3ff;
  --blue-dim: rgba(79,142,255,.15);
  --gold:     #c9a84c;
  --gold2:    #e8c870;
  --gold-dim: rgba(201,168,76,.15);
  --green:    #30d158;
  --green-dim:rgba(48,209,88,.12);
  --red:      #ff453a;
  --red-dim:  rgba(255,69,58,.12);
  --amber:    #ffd60a;

  --t1: #ffffff;
  --t2: rgba(235,235,245,.8);
  --t3: rgba(235,235,245,.6);
  --t4: rgba(235,235,245,.3);
  --t5: rgba(235,235,245,.15);

  --r:22px; --rp:100px;
}

/* ═══════════════════════════════════
   LIGHT THEME
═══════════════════════════════════ */
[data-theme="light"]{
  --bg:       #f0f2f8;
  --s1:       #ffffff;
  --s2:       #f7f8fc;
  --s3:       #eef0f7;
  --s4:       #e5e8f2;
  --border:   rgba(0,0,0,.07);
  --border2:  rgba(0,0,0,.12);
  --border3:  rgba(0,0,0,.18);
  --shadow:   rgba(100,110,160,.12);
  --shadow2:  rgba(100,110,160,.08);

  --hero-bg:  linear-gradient(160deg,#1e3a8a 0%,#1e3066 40%,#2d1b69 100%);
  --hero-bd:  rgba(79,142,255,.3);
  --hero-streak: linear-gradient(90deg,transparent 0%,rgba(129,179,255,.6) 40%,rgba(232,200,112,.5) 70%,transparent 100%);
  --nav-bg:   rgba(255,255,255,.92);

  --blue:     #2563eb;
  --blue2:    #3b82f6;
  --blue-dim: rgba(37,99,235,.1);
  --gold:     #b45309;
  --gold2:    #d97706;
  --gold-dim: rgba(180,83,9,.1);
  --green:    #16a34a;
  --green-dim:rgba(22,163,74,.1);
  --red:      #dc2626;
  --red-dim:  rgba(220,38,38,.1);
  --amber:    #d97706;

  --t1: #0f172a;
  --t2: #1e293b;
  --t3: #475569;
  --t4: #94a3b8;
  --t5: rgba(15,23,42,.07);
}

/* ═══════════════════════════════════
   TRANSITION for theme switch
═══════════════════════════════════ */
body,
.hero,.qa,.seg,.sgt,.txi,.budc,.sc,.cc,.tc,.sht,.cfm,.bnav,.qb,.fp,.sb,.hdr-date,.shtit,.fi,.bp,.bg2,.tst,.emp-ico,.bud-tr,.orb1,.orb2{
  transition: background .35s ease, border-color .35s ease, color .35s ease, box-shadow .35s ease;
}

/* ═══════════════════════════════════
   BASE
═══════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{min-height:100%;background:var(--bg);color:var(--t1);overflow-x:hidden;-webkit-font-smoothing:antialiased}
[data-lang="ar"] body,[data-lang="ar"]{font-family:'Cairo',sans-serif}
[data-lang="en"] body,[data-lang="en"]{font-family:'Inter',sans-serif}
[data-lang="ar"]{direction:rtl}
[data-lang="en"]{direction:ltr}

::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ── Ambient orbs ── */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(90px)}
[data-theme="dark"] .orb{opacity:.4}
[data-theme="light"] .orb{opacity:.18}
.orb1{width:500px;height:500px;top:-150px;right:-100px;background:radial-gradient(circle,rgba(79,142,255,.45) 0%,transparent 70%);animation:o1 18s ease-in-out infinite}
.orb2{width:420px;height:420px;bottom:-100px;left:-80px;background:radial-gradient(circle,rgba(201,168,76,.3) 0%,transparent 70%);animation:o2 22s ease-in-out infinite}
.orb3{width:300px;height:300px;top:40%;left:30%;background:radial-gradient(circle,rgba(48,209,88,.15) 0%,transparent 70%);animation:o3 28s ease-in-out infinite}
@keyframes o1{0%,100%{transform:translate(0,0)}33%{transform:translate(-40px,30px)}66%{transform:translate(20px,-20px)}}
@keyframes o2{0%,100%{transform:translate(0,0)}33%{transform:translate(30px,-40px)}66%{transform:translate(-20px,20px)}}
@keyframes o3{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-30px)}}

[data-theme="dark"] body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.018}

#app{position:relative;z-index:2;max-width:420px;margin:0 auto;min-height:100svh;padding-bottom:100px}

/* ═══════════════════════════════════
   HEADER
═══════════════════════════════════ */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:52px 20px 0;animation:fd .7s cubic-bezier(.16,1,.3,1) both}
.hdr-l{display:flex;align-items:center;gap:11px}
.app-ico{width:42px;height:42px;border-radius:13px;background:linear-gradient(145deg,#1a2340,#0d1530);border:1px solid rgba(79,142,255,.35);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(79,142,255,.25),inset 0 1px 0 rgba(255,255,255,.1);flex-shrink:0}
.app-nm{font-size:20px;font-weight:800;letter-spacing:-.5px;color:var(--t1)}
.app-nm span{color:var(--gold2)}

/* header controls */
.hdr-r{display:flex;align-items:center;gap:8px}
.hdr-ctrl{width:36px;height:36px;border-radius:11px;border:1px solid var(--border2);background:var(--s2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--t3)}
.hdr-ctrl:hover{background:var(--s3);border-color:var(--border3);color:var(--t1)}
.hdr-ctrl:active{transform:scale(.93)}
.hdr-date{font-size:12px;font-weight:500;color:var(--t3);line-height:1.4;text-align:left}
[data-lang="ar"] .hdr-date{text-align:right}
.hdr-date strong{display:block;color:var(--t2);font-size:13px;font-weight:700}

/* ═══════════════════════════════════
   HERO CARD
═══════════════════════════════════ */
.hero{margin:20px 16px 0;border-radius:28px;padding:24px 22px 20px;position:relative;overflow:hidden;background:var(--hero-bg);border:1px solid var(--hero-bd);box-shadow:0 28px 56px var(--shadow),0 0 0 1px rgba(255,255,255,.04),inset 0 1px 0 rgba(255,255,255,.08);animation:hu .8s .1s cubic-bezier(.16,1,.3,1) both}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:var(--hero-streak)}
.hero::after{content:'';position:absolute;top:-80px;right:-60px;width:260px;height:260px;border-radius:50%;background:radial-gradient(circle,rgba(79,142,255,.13) 0%,transparent 65%);pointer-events:none}
.hero-chip{display:flex;align-items:center;gap:8px;margin-bottom:20px}
.chip-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2s infinite;flex-shrink:0}
.chip-lbl{font-size:11px;font-weight:600;color:rgba(255,255,255,.55);letter-spacing:1px;text-transform:uppercase}
.bal-sym{font-size:17px;font-weight:300;color:rgba(255,255,255,.5);vertical-align:top;margin-top:11px;display:inline-block}
[data-lang="ar"] .bal-sym{margin-left:4px}
[data-lang="en"] .bal-sym{margin-right:4px}
.bal-num{font-size:48px;font-weight:800;letter-spacing:-3px;line-height:1;background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.72) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.bal-tag{display:inline-flex;align-items:center;gap:5px;margin-top:7px;border-radius:var(--rp);padding:4px 12px;font-size:11px;font-weight:700;transition:all .3s}
.hero-div{height:1px;background:rgba(255,255,255,.1);margin:17px 0}
.hero-stats{display:grid;grid-template-columns:1fr 1fr}
.hs{display:flex;align-items:center;gap:10px}
[data-lang="ar"] .hs+.hs{border-right:1px solid rgba(255,255,255,.1);padding-right:14px}
[data-lang="en"] .hs+.hs{border-left:1px solid rgba(255,255,255,.1);padding-left:14px}
.hs-ico{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hs-ico.i{background:rgba(48,209,88,.18)}.hs-ico.e{background:rgba(255,69,58,.18)}
.hs-lbl{font-size:11px;color:rgba(255,255,255,.45);font-weight:500;margin-bottom:2px}
.hs-val{font-size:15px;font-weight:800;letter-spacing:-.5px}
.hs-val.i{color:#34d86a}.hs-val.e{color:#ff6b62}

/* ═══════════════════════════════════
   QUICK ACTIONS
═══════════════════════════════════ */
.qa{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:14px 16px 0;animation:fu .6s .22s cubic-bezier(.16,1,.3,1) both}
.qb{display:flex;flex-direction:column;align-items:center;gap:7px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:15px 8px 13px;cursor:pointer;transition:all .2s cubic-bezier(.16,1,.3,1);color:var(--t3);font-size:11px;font-weight:700;box-shadow:0 2px 8px var(--shadow2)}
[data-lang="ar"] .qb{font-family:'Cairo',sans-serif}
[data-lang="en"] .qb{font-family:'Inter',sans-serif}
.qb:hover{background:var(--s3);border-color:var(--border2);color:var(--t1);transform:translateY(-3px);box-shadow:0 10px 28px var(--shadow)}
.qb:active{transform:scale(.96) translateY(0)}
.qi{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.qb:hover .qi{transform:scale(1.08)}
.qi.a{background:var(--green-dim)}.qi.b{background:var(--red-dim)}.qi.c{background:var(--gold-dim)}.qi.d{background:var(--blue-dim)}

/* ═══════════════════════════════════
   SEGMENT
═══════════════════════════════════ */
.seg{margin:16px 16px 0;background:var(--s1);border:1px solid var(--border);border-radius:var(--rp);padding:4px;display:grid;grid-template-columns:repeat(3,1fr);gap:2px;animation:fu .6s .3s cubic-bezier(.16,1,.3,1) both;box-shadow:0 2px 8px var(--shadow2)}
.sgt{background:transparent;border:none;color:var(--t4);padding:9px 4px;border-radius:var(--rp);cursor:pointer;font-size:12px;font-weight:700;transition:all .25s cubic-bezier(.16,1,.3,1);display:flex;align-items:center;justify-content:center;gap:5px}
[data-lang="ar"] .sgt{font-family:'Cairo',sans-serif}
[data-lang="en"] .sgt{font-family:'Inter',sans-serif}
.sgt.active{background:var(--blue);color:#fff;box-shadow:0 3px 14px rgba(79,142,255,.4)}
[data-theme="light"] .sgt.active{background:var(--blue);color:#fff}
.sgt svg{transition:transform .2s}
.sgt.active svg{transform:scale(1.1)}

/* ═══════════════════════════════════
   SECTION HEAD
═══════════════════════════════════ */
.sh{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 10px}
.st{font-size:15px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.std{width:5px;height:5px;border-radius:50%;background:var(--blue);box-shadow:0 0 8px var(--blue);flex-shrink:0}
.sb{background:var(--s2);border:1px solid var(--border);color:var(--t3);font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--rp)}

/* ═══════════════════════════════════
   FILTERS
═══════════════════════════════════ */
.flt{display:flex;gap:7px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.flt::-webkit-scrollbar{display:none}
.fp{background:var(--s1);border:1px solid var(--border);color:var(--t3);font-size:11px;font-weight:700;padding:6px 14px;border-radius:var(--rp);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s;box-shadow:0 1px 4px var(--shadow2)}
[data-lang="ar"] .fp{font-family:'Cairo',sans-serif}
[data-lang="en"] .fp{font-family:'Inter',sans-serif}
.fp:hover{border-color:var(--border2);color:var(--t2)}
.fp.active{background:var(--blue-dim);border-color:var(--blue);color:var(--blue2)}
[data-theme="light"] .fp.active{color:var(--blue)}

/* ═══════════════════════════════════
   PANELS
═══════════════════════════════════ */
.tp{display:none}
.tp.active{display:block;animation:pi .35s cubic-bezier(.16,1,.3,1) both}

/* ═══════════════════════════════════
   TRANSACTIONS
═══════════════════════════════════ */
.txl{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.txi{background:var(--s1);border:1px solid var(--border);border-radius:18px;padding:13px;display:flex;align-items:center;gap:12px;transition:all .22s cubic-bezier(.16,1,.3,1);animation:si .4s cubic-bezier(.16,1,.3,1) both;position:relative;overflow:hidden;box-shadow:0 2px 8px var(--shadow2)}
[data-theme="dark"] .txi::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 50%);pointer-events:none}
.txi:hover{background:var(--s2);border-color:var(--border2);transform:translateX(-2px);box-shadow:0 6px 20px var(--shadow)}
[data-lang="en"] .txi:hover{transform:translateX(2px)}
.tx-ico{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.txb{flex:1;min-width:0}
.txn{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px;color:var(--t1)}
.txm{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tct{font-size:10px;font-weight:700;color:var(--t4);background:var(--s3);border:1px solid var(--border);border-radius:var(--rp);padding:2px 8px}
.ttime{font-size:10px;color:var(--t4)}
.txr{text-align:left;flex-shrink:0;display:flex;align-items:center;gap:6px}
[data-lang="ar"] .txr{text-align:left}
[data-lang="en"] .txr{text-align:right}
.txa{font-size:15px;font-weight:800;letter-spacing:-.3px}
.tx-actions{display:flex;gap:4px;align-items:center}
.txd{width:30px;height:30px;border-radius:9px;background:transparent;border:none;cursor:pointer;color:var(--t4);display:flex;align-items:center;justify-content:center;transition:all .18s;opacity:0;flex-shrink:0}
.txi:hover .txd{opacity:1}
.txd:hover{background:var(--red-dim);color:var(--red)}
.txd-edit:hover{background:var(--gold-dim)!important;color:var(--gold2)!important}
@media(hover:none),(pointer:coarse){
  .txd{opacity:1;background:var(--s3);border:1px solid var(--border)}
  .txd-edit{color:var(--gold)!important}
  .txd:not(.txd-edit){color:var(--red)!important}
}

/* ═══════════════════════════════════
   EMPTY STATE
═══════════════════════════════════ */
.emp{text-align:center;padding:52px 24px;animation:fu .5s cubic-bezier(.16,1,.3,1) both}
.emp-ico{width:76px;height:76px;border-radius:24px;margin:0 auto 18px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.emp h3{font-size:17px;font-weight:800;margin-bottom:8px;color:var(--t1)}
.emp p{font-size:13px;color:var(--t4);line-height:1.6}

/* ═══════════════════════════════════
   BUDGETS
═══════════════════════════════════ */
.budl{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.budc{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:17px 17px 15px;position:relative;overflow:hidden;animation:si .4s cubic-bezier(.16,1,.3,1) both;transition:all .2s;box-shadow:0 2px 8px var(--shadow2)}
.budc:hover{border-color:var(--border2)}
[data-theme="dark"] .budc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 50%);pointer-events:none}
.bud-top{display:flex;align-items:center;gap:11px;margin-bottom:15px}
.bud-ico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bud-nm{font-size:14px;font-weight:800;flex:1;color:var(--t1)}
.bud-pct{font-size:12px;font-weight:800;padding:3px 10px;border-radius:var(--rp)}
.bud-tr{height:5px;background:var(--s3);border-radius:3px;margin-bottom:11px;overflow:visible;position:relative}
[data-theme="light"] .bud-tr{background:var(--s4)}
.bud-fl{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.16,1,.3,1);position:relative}
.bud-fl::after{content:'';position:absolute;right:-1px;top:-3px;width:11px;height:11px;border-radius:50%;background:inherit;box-shadow:0 0 8px currentColor}
.bud-bt{display:flex;justify-content:space-between;font-size:12px;color:var(--t4)}
.bud-bt strong{color:var(--t2);font-weight:700}
.bud-ov{margin-top:10px;background:var(--red-dim);border:1px solid rgba(220,38,38,.2);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--red);font-weight:700;display:flex;align-items:center;gap:7px}
.budd{width:28px;height:28px;border-radius:9px;background:transparent;border:none;cursor:pointer;color:var(--t4);display:flex;align-items:center;justify-content:center;transition:all .18s}
.budd:hover{background:var(--red-dim);color:var(--red)}

/* ═══════════════════════════════════
   STATS
═══════════════════════════════════ */
.sw{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.sr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sc{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:18px;animation:si .4s cubic-bezier(.16,1,.3,1) both;position:relative;overflow:hidden;box-shadow:0 2px 8px var(--shadow2)}
[data-theme="dark"] .sc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 60%);pointer-events:none}
.si2{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.sl{font-size:11px;font-weight:600;color:var(--t4);letter-spacing:.3px;margin-bottom:4px}
.sv{font-size:25px;font-weight:900;letter-spacing:-1.5px;line-height:1;margin-bottom:3px}
.ss{font-size:11px;color:var(--t4)}
.cc{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:18px 18px 14px;animation:si .5s .1s cubic-bezier(.16,1,.3,1) both;box-shadow:0 2px 8px var(--shadow2)}
.ct{font-size:13px;font-weight:800;margin-bottom:14px;color:var(--t2)}
.cb{display:flex;align-items:flex-end;gap:7px;height:88px}
.col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.bar{width:100%;border-radius:6px 6px 0 0;min-height:4px;transition:height 1s cubic-bezier(.16,1,.3,1)}
.barlbl{font-size:9px;color:var(--t4);font-weight:600}
.tc{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:18px;animation:si .5s .15s cubic-bezier(.16,1,.3,1) both;box-shadow:0 2px 8px var(--shadow2)}
.tcr{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.tcr:last-child{margin-bottom:0}
.tci{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tcn{font-size:12px;font-weight:700;flex:1;color:var(--t2)}
.tctr{flex:2;height:4px;background:var(--s3);border-radius:2px;overflow:hidden}
.tcf{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.16,1,.3,1)}
.tca{font-size:12px;font-weight:800;min-width:60px}
[data-lang="ar"] .tca{text-align:left}
[data-lang="en"] .tca{text-align:right}

/* ═══════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════ */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:var(--nav-bg);backdrop-filter:blur(24px) saturate(1.5);border-top:1px solid var(--border);padding:10px 20px 28px;display:flex;justify-content:space-around;align-items:center;z-index:100;box-shadow:0 -4px 20px var(--shadow2)}
.nb{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--t4);font-size:10px;font-weight:700;padding:6px 14px;border-radius:14px;transition:all .2s}
[data-lang="ar"] .nb{font-family:'Cairo',sans-serif}
[data-lang="en"] .nb{font-family:'Inter',sans-serif}
.nb.active{color:var(--blue)}
.nb:hover:not(.active){color:var(--t2)}
.ni{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.nb.active .ni svg{filter:drop-shadow(0 0 5px var(--blue))}

/* ═══════════════════════════════════
   FAB
═══════════════════════════════════ */
.fab{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateX(146px);width:52px;height:52px;border-radius:50%;background:linear-gradient(145deg,var(--blue),#2c5ee8);border:none;cursor:pointer;z-index:101;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(79,142,255,.5),0 0 0 1px rgba(255,255,255,.1);transition:all .25s cubic-bezier(.16,1,.3,1)}
[data-lang="en"] .fab{transform:translateX(-50%) translateX(-146px)}
.fab:hover{box-shadow:0 12px 36px rgba(79,142,255,.65);transform:translateX(-50%) translateX(146px) scale(1.1)}
[data-lang="en"] .fab:hover{transform:translateX(-50%) translateX(-146px) scale(1.1)}
.fab:active{transform:translateX(-50%) translateX(146px) scale(.95)!important}

/* ═══════════════════════════════════
   OVERLAY / SHEET
═══════════════════════════════════ */
.ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.ov.open{opacity:1;pointer-events:all}
.sht{background:var(--s1);border:1px solid var(--border);border-radius:32px 32px 0 0;width:100%;max-width:420px;padding:14px 22px 44px;transform:translateY(100%);transition:transform .45s cubic-bezier(.16,1,.3,1);max-height:90svh;overflow-y:auto;box-shadow:0 -24px 60px var(--shadow)}
.ov.open .sht{transform:translateY(0)}
.hdl{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 22px;display:block}
.shtit{font-size:20px;font-weight:900;letter-spacing:-.5px;margin-bottom:22px;display:flex;align-items:center;gap:10px;color:var(--t1)}
/* confirm modal */
.cfm{background:var(--s1);border:1px solid var(--border);border-radius:28px;padding:30px 24px;width:calc(100% - 40px);max-width:340px;margin:auto;align-self:center;transform:scale(.88) translateY(24px);transition:all .35s cubic-bezier(.16,1,.3,1);box-shadow:0 40px 80px var(--shadow)}
.ov.open .cfm{transform:scale(1) translateY(0)}
.cfm-ico{text-align:center;margin-bottom:14px}
.cfm-ico-w{width:64px;height:64px;border-radius:20px;margin:0 auto;background:var(--red-dim);border:1px solid rgba(220,38,38,.2);display:flex;align-items:center;justify-content:center}
.cfm h3{font-size:18px;font-weight:900;text-align:center;margin-bottom:8px;color:var(--t1)}
.cfm p{font-size:13px;color:var(--t3);text-align:center;margin-bottom:22px;line-height:1.6}
.cfm-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* ═══════════════════════════════════
   TYPE TOGGLE
═══════════════════════════════════ */
.ttog{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.tbt{padding:13px;border-radius:16px;border:1px solid var(--border);background:var(--s2);color:var(--t3);cursor:pointer;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
[data-lang="ar"] .tbt{font-family:'Cairo',sans-serif}
[data-lang="en"] .tbt{font-family:'Inter',sans-serif}
.tbt:hover{border-color:var(--border2)}
.tbt.i.active{background:var(--green-dim);border-color:rgba(48,209,88,.35);color:var(--green)}
[data-theme="light"] .tbt.i.active{color:var(--green)}
.tbt.e.active{background:var(--red-dim);border-color:rgba(220,38,38,.35);color:var(--red)}

/* ═══════════════════════════════════
   FORM
═══════════════════════════════════ */
.fg{margin-bottom:16px}
.fl{font-size:12px;font-weight:700;color:var(--t3);letter-spacing:.3px;margin-bottom:8px;display:block}
.fi{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:16px;padding:14px 17px;color:var(--t1);font-size:16px;font-weight:600;outline:none;transition:all .2s}
[data-lang="ar"] .fi{font-family:'Cairo',sans-serif;text-align:right}
[data-lang="en"] .fi{font-family:'Inter',sans-serif;text-align:left}
.fi:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(79,142,255,.12)}
.fi::placeholder{color:var(--t4);font-weight:400}
.fi-lg{font-size:30px;font-weight:800;letter-spacing:-1px;text-align:center!important;padding:18px}

/* ═══════════════════════════════════
   CAT GRID
═══════════════════════════════════ */
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cc2{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:11px 6px;cursor:pointer;color:var(--t3);font-size:11px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .18s}
[data-lang="ar"] .cc2{font-family:'Cairo',sans-serif}
[data-lang="en"] .cc2{font-family:'Inter',sans-serif}
.cc2:hover{border-color:var(--border2);color:var(--t2)}
.cc2.active{border-color:var(--blue);background:var(--blue-dim);color:var(--blue2)}
[data-theme="light"] .cc2.active{color:var(--blue)}
.ci2{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center}

/* ═══════════════════════════════════
   BUTTONS
═══════════════════════════════════ */
.bp{width:100%;padding:16px;border-radius:16px;border:none;background:linear-gradient(145deg,var(--blue),#2c5ee8);color:#fff;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:0 6px 20px rgba(79,142,255,.35);margin-top:8px}
[data-lang="ar"] .bp{font-family:'Cairo',sans-serif}
[data-lang="en"] .bp{font-family:'Inter',sans-serif}
.bp:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(79,142,255,.45)}
.bp:active{transform:scale(.97)}
.bg2{padding:15px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;font-size:14px;font-weight:700;transition:all .18s;width:100%}
[data-lang="ar"] .bg2{font-family:'Cairo',sans-serif}
[data-lang="en"] .bg2{font-family:'Inter',sans-serif}
.bg2:hover{background:var(--s2)}
.bdn{background:var(--red-dim)!important;border:1px solid rgba(220,38,38,.3)!important;color:var(--red)!important;box-shadow:none!important}
.bdn:hover{background:rgba(220,38,38,.2)!important}

/* ═══════════════════════════════════
   TOAST
═══════════════════════════════════ */
.tst{position:fixed;bottom:108px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:12px 20px;font-size:13px;font-weight:700;white-space:nowrap;z-index:999;opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);pointer-events:none;box-shadow:0 12px 32px var(--shadow);display:flex;align-items:center;gap:8px;color:var(--t1)}
[data-lang="ar"] .tst{font-family:'Cairo',sans-serif}
[data-lang="en"] .tst{font-family:'Inter',sans-serif}
.tst.show{opacity:1;transform:translateX(-50%) translateY(0)}
.tst.ok{border-color:rgba(48,209,88,.35)}.tst.err{border-color:rgba(220,38,38,.35)}.tst.warn{border-color:rgba(255,214,10,.35)}
.td{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tst.ok .td{background:var(--green)}.tst.err .td{background:var(--red)}.tst.warn .td{background:var(--amber)}

/* ═══════════════════════════════════
   ANIMATIONS
═══════════════════════════════════ */
@keyframes fd{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes hu{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes pi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes si{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
[data-lang="en"] @keyframes si{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}
.txi:nth-child(1){animation-delay:.00s}.txi:nth-child(2){animation-delay:.04s}.txi:nth-child(3){animation-delay:.08s}
.txi:nth-child(4){animation-delay:.12s}.txi:nth-child(5){animation-delay:.16s}.txi:nth-child(6){animation-delay:.20s}
</style>
</head>
<body>

<div class="ambient">

<div id="app">

  <!-- Quick Actions -->

<div class="ov" id="addOverlay" onclick="cls('addOverlay',event)">

function t(key){ return I18N[lang][key]||key }
function catName(id){ return I18N[lang].cats[id]||id }
function ico(id,color,sz=18){return `<svg width="${sz}" height="${sz}" style="color:${color}" fill="none"><use href="#${id}"/></svg>`}

/* ══════════════════════════════════
   PERSIST
══════════════════════════════════ */
function save(){try{localStorage.setItem(SK.tx,JSON.stringify(txs));localStorage.setItem(SK.bud,JSON.stringify(buds))}catch(e){}}
function load(){
  try{txs=JSON.parse(localStorage.getItem(SK.tx)||'[]');buds=JSON.parse(localStorage.getItem(SK.bud)||'[]')}catch(e){txs=[];buds=[]}
  try{const s=JSON.parse(localStorage.getItem(SK.settings)||'{}');lang=s.lang||'ar';theme=s.theme||'dark'}catch(e){}
}
function saveSettings(){try{localStorage.setItem(SK.settings,JSON.stringify({lang,theme}))}catch(e){}}

/* ══════════════════════════════════
   THEME & LANG
══════════════════════════════════ */
function applyTheme(){
  document.documentElement.setAttribute('data-theme',theme);
  document.getElementById('iconSun').style.display  = theme==='dark'?'block':'none';
  document.getElementById('iconMoon').style.display = theme==='dark'?'none':'block';
}
function applyLang(){
  document.documentElement.setAttribute('data-lang',lang);
  document.documentElement.setAttribute('lang',lang);
  document.documentElement.setAttribute('dir',lang==='ar'?'rtl':'ltr');
  document.getElementById('langBtn').title = lang==='ar'?'English':'عربي';
  document.getElementById('langBtn').textContent = '';
  document.getElementById('langBtn').innerHTML = lang==='ar'
    ? '<span style="font-size:12px;font-weight:800;color:currentColor">EN</span>'
    : '<span style="font-size:12px;font-weight:800;color:currentColor">ع</span>';
  // Update all i18n spans
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    if(I18N[lang][k]) el.textContent=I18N[lang][k];
  });
  // Update placeholders
  document.getElementById('txNote').placeholder  = t('notePlaceholder');
  document.getElementById('editNote').placeholder = t('notePlaceholder');
  // Re-render everything
  renderAll();
  renderCatGrid();
}
function toggleTheme(){theme=theme==='dark'?'light':'dark';applyTheme();saveSettings()}
function toggleLang(){lang=lang==='ar'?'en':'ar';applyLang();saveSettings()}

/* ══════════════════════════════════
   FORMAT & DATE
══════════════════════════════════ */
function fmt(n){
  const num=Number(n||0);
  if(lang==='ar') return num.toLocaleString('ar-EG',{maximumFractionDigits:0});
  return num.toLocaleString('en-US',{maximumFractionDigits:0});
}
function updateDate(){
  const d=new Date();
  document.getElementById('dayName').textContent=I18N[lang].daysFull[d.getDay()];
  document.getElementById('dateStr').textContent=`${d.getDate()} ${I18N[lang].months[d.getMonth()]}`;
}

/* ══════════════════════════════════
   RENDER ALL
══════════════════════════════════ */
function renderAll(){updateDate();renderBalance();renderTxList();renderBudgets();renderStats()}

function renderBalance(){
  const inc=txs.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
  const exp=txs.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
  const bal=inc-exp;
  document.getElementById('totalBalance').textContent=fmt(Math.abs(bal));
  document.getElementById('totalInc').textContent=fmt(inc);
  document.getElementById('totalExp').textContent=fmt(exp);
  const tag=document.getElementById('balTag');
  const chk=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const wrn=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="currentColor" stroke-width="2" fill="none"/></svg>`;
  if(bal<0){Object.assign(tag.style,{background:'rgba(220,38,38,.12)',borderColor:'rgba(220,38,38,.3)',color:'var(--red)',border:'1px solid'});tag.innerHTML=`${wrn} ${t('negativeBalance')}`}
  else if(!txs.length){Object.assign(tag.style,{background:'rgba(255,255,255,.05)',borderColor:'rgba(255,255,255,.08)',color:'var(--t4)',border:'1px solid'});tag.innerHTML=t('noData')}
  else{Object.assign(tag.style,{background:'rgba(48,209,88,.12)',borderColor:'rgba(48,209,88,.25)',color:'var(--green)',border:'1px solid'});tag.innerHTML=`${chk} ${t('positiveBalance')}`}
}

/* ══════════════════════════════════
   TRANSACTIONS
══════════════════════════════════ */
function renderTxList(){
  const cats=[...new Set(txs.map(x=>x.categoryId))];
  document.getElementById('filterRow').innerHTML=
    `<button class="fp ${AF==='all'?'active':''}" onclick="setF('all')">${t('all')} (${txs.length})</button>`
    +cats.map(cid=>{const n=txs.filter(x=>x.categoryId===cid).length;
      return `<button class="fp ${AF===cid?'active':''}" onclick="setF('${cid}')">${catName(cid)} ${n}</button>`;
    }).join('');
  const filtered=AF==='all'?txs:txs.filter(x=>x.categoryId===AF);
  document.getElementById('txCount').textContent=filtered.length;
  const list=document.getElementById('txList');
  if(!filtered.length){
    const lines=t('noTxSub').split('\n');
    list.innerHTML=`<div class="emp"><div class="emp-ico"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" style="color:var(--t4)"><rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><line x1="2" y1="10" x2="22" y2="10" stroke="currentColor" stroke-width="1.5"/></svg></div><h3>${t('noTx')}</h3><p>${lines.join('<br>')}</p></div>`;
    return;
  }
  list.innerHTML=[...filtered].reverse().map((tx,i)=>{
    const cat=CATS.find(c=>c.id===tx.categoryId)||CATS[13];
    const d=new Date(tx.date);
    const ts=d.toLocaleTimeString(lang==='ar'?'ar-EG':'en-US',{hour:'2-digit',minute:'2-digit'});
    const ds=d.toLocaleDateString(lang==='ar'?'ar-EG':'en-US',{month:'short',day:'numeric'});
    return `<div class="txi" style="animation-delay:${i*.045}s">
      <div class="tx-ico" style="background:${cat.color}18">${ico(cat.icon,cat.color,21)}</div>
      <div class="txb">
        <div class="txn">${tx.note||catName(cat.id)}</div>
        <div class="txm"><span class="tct">${catName(cat.id)}</span><span class="ttime">${ds} · ${ts}</span></div>
      </div>
      <div class="txr">
        <div class="txa" style="color:${tx.type==='income'?'var(--green)':'var(--t1)'}">
          ${tx.type==='income'?'+':'-'}${fmt(tx.amount)}
        </div>
        <div class="tx-actions">
          <button class="txd txd-edit" onclick="openEdit(${tx.id})">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="txd" onclick="delTx(${tx.id})">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}
function setF(f){AF=f;renderTxList()}
function delTx(id){txs=txs.filter(x=>x.id!==id);save();renderAll();toast(t('deleted'),'warn')}

/* ══════════════════════════════════
   BUDGETS
══════════════════════════════════ */
function renderBudgets(){
  const bl=document.getElementById('budList');
  if(!buds.length){
    const lines=t('noBudSub').split('\n');
    bl.innerHTML=`<div class="emp"><div class="emp-ico"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" style="color:var(--t4)"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><path d="M12 6v6l4 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div><h3>${t('noBud')}</h3><p>${lines.join('<br>')}</p></div>`;
    return;
  }
  bl.innerHTML=buds.map((b,i)=>{
    const cat=CATS.find(c=>c.id===b.categoryId)||CATS[13];
    const spent=txs.filter(x=>x.type==='expense'&&x.categoryId===b.categoryId).reduce((s,x)=>s+x.amount,0);
    const pct=Math.min((spent/b.limit)*100,100);
    const rem=b.limit-spent;
    const col=pct>=100?'var(--red)':pct>=75?'var(--amber)':'var(--green)';
    return `<div class="budc" style="animation-delay:${i*.07}s">
      <div class="bud-top">
        <div class="bud-ico" style="background:${cat.color}18">${ico(cat.icon,cat.color,19)}</div>
        <div class="bud-nm">${catName(cat.id)}</div>
        <div class="bud-pct" style="color:${col};background:${col}18;border:1px solid ${col}30">${Math.round(pct)}%</div>
        <button class="budd" onclick="delBud('${b.categoryId}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="bud-tr"><div class="bud-fl" style="width:${pct}%;background:linear-gradient(90deg,${col},${col}99)"></div></div>
      <div class="bud-bt"><span>${t('spent')}: <strong style="color:${col}">${fmt(spent)}</strong></span><span>${t('limit')}: <strong>${fmt(b.limit)}</strong></span></div>
      ${rem<0?`<div class="bud-ov"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="currentColor" stroke-width="2"/></svg>${t('exceeded')} ${fmt(Math.abs(rem))}</div>`:''}
    </div>`;
  }).join('');
}
function delBud(cid){buds=buds.filter(b=>b.categoryId!==cid);save();renderBudgets();toast(t('budDeleted'),'warn')}

/* ══════════════════════════════════
   STATS
══════════════════════════════════ */
function renderStats(){
  const sw=document.getElementById('statsWrap');
  const inc=txs.filter(x=>x.type==='income').reduce((s,x)=>s+x.amount,0);
  const exp=txs.filter(x=>x.type==='expense').reduce((s,x)=>s+x.amount,0);
  const sr=inc>0?Math.round(((inc-exp)/inc)*100):0;
  const et=txs.filter(x=>x.type==='expense');
  const avg=et.length?Math.round(exp/et.length):0;
  const days7=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toDateString();
    days7.push({l:I18N[lang].days[d.getDay()],v:txs.filter(x=>x.type==='expense'&&new Date(x.date).toDateString()===ds).reduce((s,x)=>s+x.amount,0)});
  }
  const mx=Math.max(...days7.map(d=>d.v),1);
  const top=CATS.filter(c=>c.type==='expense').map(c=>({cat:c,total:txs.filter(x=>x.categoryId===c.id&&x.type==='expense').reduce((s,x)=>s+x.amount,0)})).filter(x=>x.total>0).sort((a,b)=>b.total-a.total).slice(0,4);
  sw.innerHTML=`
    <div class="sr2">
      <div class="sc"><div class="si2" style="background:var(--green-dim)">${ico('I-invest','var(--green)',17)}</div><div class="sl">${t('savingRate')}</div><div class="sv" style="color:${sr>=0?'var(--green)':'var(--red)'}">${sr}%</div><div class="ss">${sr>=0?t('healthyRate'):t('expGtInc')}</div></div>
      <div class="sc"><div class="si2" style="background:var(--gold-dim)">${ico('I-bills','var(--gold2)',17)}</div><div class="sl">${t('avgExp')}</div><div class="sv" style="color:var(--gold2);font-size:21px">${fmt(avg)}</div><div class="ss">${t('perTx')}</div></div>
    </div>
    <div class="sr2">
      <div class="sc"><div class="si2" style="background:var(--blue-dim)">${ico('I-salary','var(--blue2)',17)}</div><div class="sl">${t('txCount')}</div><div class="sv" style="color:var(--blue2)">${txs.length}</div><div class="ss">${txs.filter(x=>x.type==='income').length} ${t('income')} · ${et.length} ${t('expense')}</div></div>
      <div class="sc"><div class="si2" style="background:rgba(167,139,250,.12)">${ico('I-other','#c084fc',17)}</div><div class="sl">${t('budCount')}</div><div class="sv" style="color:#c084fc">${buds.length}</div><div class="ss">${t('monitoring')}</div></div>
    </div>
    ${days7.some(d=>d.v>0)?`<div class="cc"><div class="ct">${t('last7')}</div><div class="cb">${days7.map((d,i)=>`<div class="col"><div class="bar" style="height:${(d.v/mx)*80+4}px;background:${d.v>0?'linear-gradient(to top,var(--blue),var(--blue2))':'var(--s3)'};opacity:${d.v>0?1:.3}"></div><div class="barlbl">${d.l}</div></div>`).join('')}</div></div>`:''}
    ${top.length?`<div class="tc"><div style="font-size:13px;font-weight:800;margin-bottom:14px;color:var(--t2)">${t('topCats')}</div>${top.map(({cat,total})=>`<div class="tcr"><div class="tci" style="background:${cat.color}18">${ico(cat.icon,cat.color,15)}</div><div class="tcn">${catName(cat.id)}</div><div class="tctr"><div class="tcf" style="width:${(total/top[0].total)*100}%;background:${cat.color}"></div></div><div class="tca" style="color:${cat.color}">${fmt(total)}</div></div>`).join('')}</div>`:''}
  `;
}

/* ══════════════════════════════════
   ADD SHEET
══════════════════════════════════ */
function openSheet(type,sub){
  if(type==='add'){
    curType=sub||'expense';
    document.getElementById('typeInc').classList.toggle('active',curType==='income');
    document.getElementById('typeExp').classList.toggle('active',curType==='expense');
    selCat=curType==='income'?'salary':'food';
    renderCatGrid();
    document.getElementById('txAmt').value='';
    document.getElementById('txNote').value='';
    document.getElementById('addOverlay').classList.add('open');
  } else {
    budCat='food';renderBudCatGrid();
    document.getElementById('budgetAmt').value='';
    document.getElementById('budgetOverlay').classList.add('open');
  }
  document.body.style.overflow='hidden';
}
function cls(id,e){if(!e||e.target===document.getElementById(id)){document.getElementById(id).classList.remove('open');document.body.style.overflow=''}}
function setType(t2){curType=t2;document.getElementById('typeInc').classList.toggle('active',t2==='income');document.getElementById('typeExp').classList.toggle('active',t2==='expense');selCat=t2==='income'?'salary':'food';renderCatGrid()}
function renderCatGrid(){document.getElementById('catGrid').innerHTML=CATS.filter(c=>c.type===curType||c.type==='both').map(c=>`<button class="cc2 ${c.id===selCat?'active':''}" onclick="sc2('${c.id}')"><div class="ci2" style="background:${c.color}18">${ico(c.icon,c.color,17)}</div>${catName(c.id)}</button>`).join('')}
function sc2(id){selCat=id;renderCatGrid()}
function saveTx(){
  const amt=parseFloat(document.getElementById('txAmt').value)||0;
  if(amt<=0){toast(t('invalidAmt'),'err');return}
  const note=document.getElementById('txNote').value.trim();
  txs.push({id:Date.now(),type:curType,amount:amt,categoryId:selCat,note,date:new Date().toISOString()});
  save();renderAll();cls('addOverlay');
  toast(t('added'),'ok');
  if(curType==='expense'){const b=buds.find(x=>x.categoryId===selCat);if(b){const sp=txs.filter(x=>x.type==='expense'&&x.categoryId===selCat).reduce((s,x)=>s+x.amount,0);const p=(sp/b.limit)*100;if(p>=100)setTimeout(()=>toast(t('exceededLimit'),'err'),3200);else if(p>=80)setTimeout(()=>toast(t('nearLimit'),'warn'),3200)}}
}

/* ══════════════════════════════════
   EDIT SHEET
══════════════════════════════════ */
function openEdit(id){
  const tx=txs.find(x=>x.id===id);if(!tx)return;
  editId=id;editType=tx.type;editCat=tx.categoryId;
  document.getElementById('editTypeInc').classList.toggle('active',editType==='income');
  document.getElementById('editTypeExp').classList.toggle('active',editType==='expense');
  document.getElementById('editAmt').value=tx.amount;
  document.getElementById('editNote').value=tx.note||'';
  renderEditCatGrid();
  document.getElementById('editOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function setEditType(t2){editType=t2;document.getElementById('editTypeInc').classList.toggle('active',t2==='income');document.getElementById('editTypeExp').classList.toggle('active',t2==='expense');editCat=t2==='income'?'salary':'food';renderEditCatGrid()}
function renderEditCatGrid(){document.getElementById('editCatGrid').innerHTML=CATS.filter(c=>c.type===editType||c.type==='both').map(c=>`<button class="cc2 ${c.id===editCat?'active':''}" onclick="sec('${c.id}')"><div class="ci2" style="background:${c.color}18">${ico(c.icon,c.color,17)}</div>${catName(c.id)}</button>`).join('')}
function sec(id){editCat=id;renderEditCatGrid()}
function saveEdit(){
  const amt=parseFloat(document.getElementById('editAmt').value)||0;
  if(amt<=0){toast(t('invalidAmt'),'err');return}
  const note=document.getElementById('editNote').value.trim();
  const tx=txs.find(x=>x.id===editId);if(!tx)return;
  tx.amount=amt;tx.type=editType;tx.categoryId=editCat;tx.note=note;
  save();renderAll();cls('editOverlay');toast(t('edited'),'ok');
}

/* ══════════════════════════════════
   BUDGET
══════════════════════════════════ */
function renderBudCatGrid(){document.getElementById('budgetCatGrid').innerHTML=CATS.filter(c=>c.type==='expense').map(c=>`<button class="cc2 ${c.id===budCat?'active':''}" onclick="sbc('${c.id}')"><div class="ci2" style="background:${c.color}18">${ico(c.icon,c.color,17)}</div>${catName(c.id)}</button>`).join('')}
function sbc(id){budCat=id;renderBudCatGrid()}
function saveBudget(){
  const lim=parseFloat(document.getElementById('budgetAmt').value)||0;
  if(lim<=0){toast(t('invalidAmt'),'err');return}
  const ex=buds.find(b=>b.categoryId===budCat);if(ex)ex.limit=lim;else buds.push({categoryId:budCat,limit:lim});
  save();renderBudgets();cls('budgetOverlay');toast(t('budSaved'),'ok');
}

/* ══════════════════════════════════
   CLEAR / EXPORT
══════════════════════════════════ */
function showConfirm(){document.getElementById('confirmOverlay').classList.add('open');document.body.style.overflow='hidden'}
function clearAll(){localStorage.removeItem(SK.tx);localStorage.removeItem(SK.bud);txs=[];buds=[];AF='all';renderAll();cls('confirmOverlay');toast(t('cleared'),'ok')}
function exportData(){const b=new Blob([JSON.stringify({txs,buds,date:new Date()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`fulus-${new Date().toISOString().split('T')[0]}.json`;a.click();toast(t('exported'),'ok')}

/* ══════════════════════════════════
   TOAST
══════════════════════════════════ */
function toast(msg,type='ok'){const el=document.getElementById('toast');document.getElementById('tmsg').textContent=msg;el.className='tst '+type+' show';clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3000)}

/* ══════════════════════════════════
   TABS / NAV
══════════════════════════════════ */
function snav(tab,btn){
  document.querySelectorAll('.sgt').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  if(btn)btn.classList.add('active');
}
document.querySelectorAll('.sgt').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.sgt').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
}));

function numOnly(inp){inp.value=inp.value.replace(/[^\d.]/g,'')}

/* ══════════════════════════════════
   INIT
══════════════════════════════════ */
load();
applyTheme();
applyLang();
renderAll();
renderCatGrid();
</script>
</body>
</html>
