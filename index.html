<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>محفظتي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #0a0c10;
  --surface:   #111318;
  --card:      #161922;
  --border:    #1e2330;
  --accent:    #6c8fff;
  --accent2:   #a78bfa;
  --green:     #34d399;
  --red:       #f87171;
  --amber:     #fbbf24;
  --text:      #e8ecf5;
  --muted:     #6b7280;
  --dim:       #9ca3af;
  --glow:      rgba(108,143,255,.15);
  --glow2:     rgba(167,139,250,.12);
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;overflow-x:hidden}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ── Background mesh ── */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 80% 50% at 20% 10%, rgba(108,143,255,.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(167,139,250,.06) 0%, transparent 60%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(52,211,153,.04) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}

/* ── App shell ── */
#app{position:relative;z-index:1;max-width:430px;margin:0 auto;min-height:100svh;display:flex;flex-direction:column;padding:0 0 80px}

/* ── Header ── */
.header{
  padding:20px 20px 0;
  display:flex;align-items:center;justify-content:space-between;
  animation:slideDown .5s cubic-bezier(.16,1,.3,1) both;
}
.header-brand{display:flex;align-items:center;gap:10px}
.header-logo{
  width:38px;height:38px;border-radius:12px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  display:flex;align-items:center;justify-content:center;font-size:18px;
  box-shadow:0 4px 20px rgba(108,143,255,.4);
}
.header-title{font-size:18px;font-weight:700;letter-spacing:-.3px}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px}
.header-date{text-align:left;font-size:11px;color:var(--muted);line-height:1.5}
.header-date strong{display:block;font-size:13px;color:var(--dim);font-weight:600}

/* ── Balance card ── */
.balance-card{
  margin:20px 16px 0;
  background:linear-gradient(135deg,#151b2e 0%,#1a1430 50%,#0f1a2e 100%);
  border:1px solid rgba(108,143,255,.2);
  border-radius:24px;padding:24px;position:relative;overflow:hidden;
  animation:fadeUp .6s .1s cubic-bezier(.16,1,.3,1) both;
  box-shadow:0 8px 40px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.03),inset 0 1px 0 rgba(255,255,255,.06);
}
.balance-card::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:160px;height:160px;border-radius:50%;
  background:radial-gradient(circle,rgba(108,143,255,.15) 0%,transparent 70%);
  pointer-events:none;
}
.balance-card::after{
  content:'';position:absolute;bottom:-30px;left:-20px;
  width:120px;height:120px;border-radius:50%;
  background:radial-gradient(circle,rgba(167,139,250,.1) 0%,transparent 70%);
  pointer-events:none;
}
.balance-label{font-size:12px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;font-family:'Tajawal',sans-serif}
.balance-amount{
  font-size:42px;font-weight:900;margin:6px 0 4px;
  background:linear-gradient(135deg,#fff 30%,var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  line-height:1;letter-spacing:-2px;
}
.balance-currency{font-size:18px;font-weight:600;vertical-align:super;margin-left:4px;opacity:.7}
.balance-change{font-size:12px;color:var(--green);display:flex;align-items:center;gap:4px}
.balance-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
.bstat{
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
  border-radius:14px;padding:12px;display:flex;align-items:center;gap:10px;
}
.bstat-icon{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.bstat-icon.inc{background:rgba(52,211,153,.15)}
.bstat-icon.exp{background:rgba(248,113,113,.15)}
.bstat-label{font-size:10px;color:var(--muted);font-family:'Tajawal',sans-serif}
.bstat-val{font-size:15px;font-weight:700;margin-top:1px}
.bstat-val.inc{color:var(--green)}
.bstat-val.exp{color:var(--red)}

/* ── Quick actions ── */
.quick-actions{
  display:flex;gap:10px;margin:16px 16px 0;
  animation:fadeUp .6s .2s cubic-bezier(.16,1,.3,1) both;
}
.qa-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:14px 8px;cursor:pointer;transition:all .25s;color:var(--dim);
  font-family:'Cairo',sans-serif;font-size:11px;font-weight:600;
}
.qa-btn:hover{border-color:var(--accent);background:rgba(108,143,255,.08);color:var(--accent);transform:translateY(-2px)}
.qa-btn:active{transform:translateY(0) scale(.97)}
.qa-icon{width:36px;height:36px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;transition:transform .25s}
.qa-btn:hover .qa-icon{transform:scale(1.1)}
.qa-icon.add-in{background:rgba(52,211,153,.15)}
.qa-icon.add-ex{background:rgba(248,113,113,.15)}
.qa-icon.bud{background:rgba(251,191,36,.15)}
.qa-icon.exp-btn{background:rgba(108,143,255,.15)}

/* ── Tabs ── */
.tabs-wrap{
  margin:20px 16px 0;
  background:var(--card);border:1px solid var(--border);border-radius:16px;padding:4px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:2px;
  animation:fadeUp .6s .25s cubic-bezier(.16,1,.3,1) both;
}
.tab-btn{
  background:transparent;border:none;color:var(--muted);padding:10px 4px;border-radius:12px;
  cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;font-weight:600;
  transition:all .25s;display:flex;align-items:center;justify-content:center;gap:5px;
}
.tab-btn.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 16px rgba(108,143,255,.35)}
.tab-btn:not(.active):hover{background:rgba(255,255,255,.05);color:var(--dim)}

/* ── Tab panels ── */
.tab-panel{display:none;animation:fadeUp .35s cubic-bezier(.16,1,.3,1) both}
.tab-panel.active{display:block}

/* ── Section heading ── */
.section-head{display:flex;align-items:center;justify-content:space-between;margin:20px 16px 10px}
.section-title{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px}
.section-title span{width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;box-shadow:0 0 8px var(--accent)}
.section-badge{background:var(--border);color:var(--muted);font-size:11px;padding:2px 8px;border-radius:20px}

/* ── Transaction list ── */
.tx-list{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.tx-item{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  padding:14px;display:flex;align-items:center;gap:12px;
  transition:all .25s;cursor:default;
  animation:fadeUp .35s cubic-bezier(.16,1,.3,1) both;
}
.tx-item:hover{border-color:rgba(108,143,255,.25);background:rgba(108,143,255,.04);transform:translateX(-2px)}
.tx-icon{width:42px;height:42px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.tx-info{flex:1;min-width:0}
.tx-name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{font-size:11px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:6px}
.tx-cat-badge{background:var(--border);padding:2px 7px;border-radius:20px;font-size:10px}
.tx-right{text-align:left;flex-shrink:0}
.tx-amount{font-size:16px;font-weight:700}
.tx-amount.inc{color:var(--green)}
.tx-amount.exp{color:var(--red)}
.tx-delete{
  width:28px;height:28px;border-radius:8px;background:transparent;border:none;
  color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;transition:all .2s;flex-shrink:0;
}
.tx-delete:hover{background:rgba(248,113,113,.15);color:var(--red)}

/* ── Empty state ── */
.empty{
  text-align:center;padding:48px 24px;color:var(--muted);
  animation:fadeUp .5s cubic-bezier(.16,1,.3,1) both;
}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.4;display:block}
.empty h3{font-size:16px;font-weight:600;color:var(--dim);margin-bottom:6px}
.empty p{font-size:13px;line-height:1.6}

/* ── Budget cards ── */
.bud-list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.bud-card{
  background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;
  animation:fadeUp .35s cubic-bezier(.16,1,.3,1) both;transition:all .25s;
}
.bud-card:hover{border-color:rgba(108,143,255,.2)}
.bud-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.bud-icon{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px}
.bud-title{flex:1;font-size:14px;font-weight:600}
.bud-pct{font-size:13px;font-weight:700}
.bud-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-bottom:10px}
.bud-fill{height:100%;border-radius:3px;transition:width .8s cubic-bezier(.16,1,.3,1)}
.bud-amounts{display:flex;justify-content:space-between;font-size:11px;color:var(--muted)}
.bud-amounts strong{color:var(--dim)}

/* ── Stats tab ── */
.stats-grid{padding:0 16px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-card{
  background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;
  animation:fadeUp .35s cubic-bezier(.16,1,.3,1) both;
}
.stat-card.full{grid-column:1/-1}
.stat-card-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-family:'Tajawal',sans-serif}
.stat-card-val{font-size:26px;font-weight:800;margin:6px 0 2px;letter-spacing:-1px}
.stat-card-sub{font-size:11px;color:var(--muted)}

/* Chart bars */
.chart-bars{display:flex;align-items:flex-end;gap:6px;height:80px;margin-top:12px}
.chart-bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.chart-bar{width:100%;border-radius:4px 4px 0 0;transition:height .8s cubic-bezier(.16,1,.3,1);min-height:4px}
.chart-bar-label{font-size:9px;color:var(--muted)}

/* Cat breakdown */
.cat-breakdown{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.cat-row{display:flex;align-items:center;gap:10px}
.cat-row-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.cat-row-name{flex:1;font-size:12px;font-weight:600}
.cat-row-track{flex:2;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.cat-row-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.cat-row-amt{font-size:12px;font-weight:700;color:var(--red);min-width:60px;text-align:left}

/* ── Bottom nav ── */
.bottom-nav{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;
  background:rgba(17,19,24,.85);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);padding:8px 24px 20px;
  display:flex;justify-content:space-around;z-index:100;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  background:none;border:none;color:var(--muted);cursor:pointer;
  font-family:'Cairo',sans-serif;font-size:10px;font-weight:600;
  padding:6px 16px;border-radius:12px;transition:all .2s;
}
.nav-item.active{color:var(--accent)}
.nav-item:hover{color:var(--dim)}
.nav-icon{font-size:20px;line-height:1}

/* ── FAB ── */
.fab{
  position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateX(155px);
  width:54px;height:54px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;color:#fff;font-size:26px;cursor:pointer;
  box-shadow:0 8px 30px rgba(108,143,255,.5);z-index:101;
  display:flex;align-items:center;justify-content:center;
  transition:all .25s;
}
.fab:hover{transform:translateX(-50%) translateX(155px) scale(1.08);box-shadow:0 12px 40px rgba(108,143,255,.6)}
.fab:active{transform:translateX(-50%) translateX(155px) scale(.95)}

/* ── Overlays ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);
  z-index:200;display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity .3s;
}
.overlay.open{opacity:1;pointer-events:all}
.sheet{
  background:var(--surface);border:1px solid var(--border);
  border-radius:28px 28px 0 0;width:100%;max-width:430px;
  padding:20px 20px 36px;
  transform:translateY(100%);transition:transform .4s cubic-bezier(.16,1,.3,1);
  max-height:90svh;overflow-y:auto;
}
.overlay.open .sheet{transform:translateY(0)}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;display:block}
.sheet-title{font-size:18px;font-weight:800;margin-bottom:20px;display:flex;align-items:center;gap:8px}

/* Form elements */
.form-group{margin-bottom:14px}
.form-label{font-size:12px;color:var(--muted);margin-bottom:6px;display:block;font-weight:600}
.form-input{
  width:100%;background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:14px 16px;color:var(--text);font-family:'Cairo',sans-serif;font-size:15px;
  outline:none;transition:all .25s;
}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,143,255,.12)}
.form-input::placeholder{color:var(--muted)}

/* Type toggle */
.type-toggle{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
.type-btn{
  padding:12px;border-radius:14px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;
  font-family:'Cairo',sans-serif;font-size:13px;font-weight:700;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:all .25s;
}
.type-btn.inc.active{background:rgba(52,211,153,.15);border-color:var(--green);color:var(--green)}
.type-btn.exp.active{background:rgba(248,113,113,.15);border-color:var(--red);color:var(--red)}
.type-btn:not(.active):hover{background:rgba(255,255,255,.04)}

/* Cat grid */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.cat-chip{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:10px 6px;cursor:pointer;color:var(--dim);font-family:'Cairo',sans-serif;font-size:11px;
  display:flex;flex-direction:column;align-items:center;gap:4px;transition:all .2s;
}
.cat-chip span.chip-icon{font-size:20px}
.cat-chip:hover{border-color:var(--accent);background:rgba(108,143,255,.06)}
.cat-chip.active{border-color:var(--accent);background:rgba(108,143,255,.15);color:var(--accent)}

/* Action buttons */
.btn-primary{
  width:100%;padding:16px;border-radius:16px;border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-family:'Cairo',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:all .25s;box-shadow:0 4px 20px rgba(108,143,255,.3);
  margin-top:8px;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(108,143,255,.4)}
.btn-primary:active{transform:translateY(0) scale(.98)}
.btn-danger{
  background:rgba(248,113,113,.15);border:1px solid rgba(248,113,113,.3);
  color:var(--red);
}
.btn-danger:hover{background:rgba(248,113,113,.25) !important}

/* Confirm dialog */
.confirm-dialog{
  background:var(--surface);border:1px solid var(--border);
  border-radius:24px;padding:28px;width:calc(100% - 40px);max-width:360px;
  transform:scale(.9) translateY(20px);transition:all .3s cubic-bezier(.16,1,.3,1);
  margin:auto;align-self:center;
}
.overlay.open .confirm-dialog{transform:scale(1) translateY(0)}
.confirm-dialog .sheet-title{justify-content:center;flex-direction:column;text-align:center;gap:12px}
.confirm-dialog p{text-align:center;color:var(--muted);font-size:13px;margin-bottom:20px}
.confirm-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn-secondary{
  padding:14px;border-radius:14px;border:1px solid var(--border);
  background:transparent;color:var(--dim);cursor:pointer;
  font-family:'Cairo',sans-serif;font-size:14px;font-weight:600;transition:all .2s;
}
.btn-secondary:hover{background:rgba(255,255,255,.05)}

/* Toast */
.toast{
  position:fixed;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  padding:12px 20px;font-size:13px;font-weight:600;white-space:nowrap;
  z-index:999;opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);pointer-events:none;
  box-shadow:0 8px 30px rgba(0,0,0,.4);
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(52,211,153,.3);color:var(--green)}
.toast.err{border-color:rgba(248,113,113,.3);color:var(--red)}
.toast.warn{border-color:rgba(251,191,36,.3);color:var(--amber)}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes countUp{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}

/* Staggered list animations */
.tx-item:nth-child(1){animation-delay:.0s}
.tx-item:nth-child(2){animation-delay:.05s}
.tx-item:nth-child(3){animation-delay:.1s}
.tx-item:nth-child(4){animation-delay:.15s}
.tx-item:nth-child(5){animation-delay:.2s}

/* Badge pulse */
.balance-change::before{
  content:'';display:inline-block;width:6px;height:6px;background:var(--green);
  border-radius:50%;animation:pulse 2s infinite;
}

/* Divider */
.divider{height:1px;background:var(--border);margin:16px}

/* Filter row */
.filter-row{
  display:flex;gap:6px;padding:0 16px;margin-bottom:12px;overflow-x:auto;
  scrollbar-width:none;
}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{
  background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:6px 14px;font-family:'Cairo',sans-serif;font-size:11px;font-weight:600;
  color:var(--muted);cursor:pointer;white-space:nowrap;transition:all .2s;flex-shrink:0;
}
.filter-chip.active{background:rgba(108,143,255,.15);border-color:var(--accent);color:var(--accent)}
.filter-chip:hover:not(.active){border-color:rgba(108,143,255,.2);color:var(--dim)}

/* ── Responsive touch feedback ── */
@media (hover:none){
  .tx-item:hover{transform:none}
  .qa-btn:hover{transform:none}
}
</style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <div class="header-brand">
      <div class="header-logo">💳</div>
      <div>
        <div class="header-title">محفظتي</div>
        <div class="header-sub">تتبع أذكى لأموالك</div>
      </div>
    </div>
    <div class="header-date">
      <strong id="dayName"></strong>
      <span id="dateStr"></span>
    </div>
  </div>

  <!-- Balance Card -->
  <div class="balance-card">
    <div class="balance-label">الرصيد الإجمالي</div>
    <div class="balance-amount"><span class="balance-currency">ج.م</span><span id="totalBalance">0</span></div>
    <div class="balance-change" id="balanceChange">محدث الآن</div>
    <div class="balance-stats">
      <div class="bstat">
        <div class="bstat-icon inc">📈</div>
        <div>
          <div class="bstat-label">إجمالي الدخل</div>
          <div class="bstat-val inc" id="totalInc">0</div>
        </div>
      </div>

  <!-- Quick Actions -->

<div class="overlay" id="addOverlay" onclick="closeSheet('addOverlay',event)">

      مسح جميع البيانات؟

    <p>سيتم حذف جميع المعاملات والميزانيات بشكل نهائي ولا يمكن التراجع عن هذا الإجراء.</p>
    <div class="confirm-btns">

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ─── DATA ─── */
const SK={tx:'mw_txs',bud:'mw_buds'};
let txs=[],buds=[],curType='expense',selCat='food',budCat='food',activeFilter='all';

const CATS=[
  {id:'food',name:'طعام',icon:'🍔',type:'expense',color:'#f87171'},
  {id:'transport',name:'مواصلات',icon:'🚗',type:'expense',color:'#fb923c'},
  {id:'shopping',name:'تسوق',icon:'🛍️',type:'expense',color:'#a78bfa'},
  {id:'bills',name:'فواتير',icon:'💡',type:'expense',color:'#fbbf24'},
  {id:'health',name:'صحة',icon:'💊',type:'expense',color:'#34d399'},
  {id:'entertainment',name:'ترفيه',icon:'🎮',type:'expense',color:'#60a5fa'},
  {id:'education',name:'تعليم',icon:'📚',type:'expense',color:'#818cf8'},
  {id:'sports',name:'رياضة',icon:'⚽',type:'expense',color:'#4ade80'},
  {id:'rent',name:'إيجار',icon:'🏠',type:'expense',color:'#e879f9'},
  {id:'salary',name:'راتب',icon:'💼',type:'income',color:'#34d399'},
  {id:'freelance',name:'فري',icon:'💻',type:'income',color:'#60a5fa'},
  {id:'invest',name:'استثمار',icon:'📈',type:'income',color:'#fbbf24'},
  {id:'gift',name:'هدية',icon:'🎁',type:'income',color:'#f472b6'},
  {id:'other',name:'أخرى',icon:'✨',type:'both',color:'#9ca3af'},
];

/* ─── PERSIST ─── */
function save(){
  try{localStorage.setItem(SK.tx,JSON.stringify(txs));localStorage.setItem(SK.bud,JSON.stringify(buds));}catch(e){}
}
function load(){
  try{
    txs=JSON.parse(localStorage.getItem(SK.tx)||'[]');
    buds=JSON.parse(localStorage.getItem(SK.bud)||'[]');
  }catch(e){txs=[];buds=[];}
}

/* ─── FORMAT ─── */
function fmt(n){return Number(n||0).toLocaleString('ar-EG',{minimumFractionDigits:0,maximumFractionDigits:2});}

/* ─── DATE ─── */
function updateDate(){
  const d=new Date();
  const days=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const months=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  document.getElementById('dayName').textContent=days[d.getDay()];
  document.getElementById('dateStr').textContent=`${d.getDate()} ${months[d.getMonth()]}`;
}

/* ─── RENDER ALL ─── */
function renderAll(){renderBalance();renderTxList();renderBudgets();renderStats();}

function renderBalance(){
  const inc=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal=inc-exp;
  document.getElementById('totalBalance').textContent=fmt(Math.abs(bal));
  document.getElementById('totalInc').textContent=fmt(inc);
  document.getElementById('totalExp').textContent=fmt(exp);
  const bc=document.getElementById('balanceChange');
  if(bal<0){
    bc.style.color='var(--red)';
    bc.innerHTML='⚠️ رصيد سالب';
  } else if(txs.length===0){
    bc.style.color='var(--muted)';bc.innerHTML='لا توجد معاملات بعد';
  } else {
    bc.style.color='var(--green)';bc.innerHTML='رصيد إيجابي ✓';
  }
}

/* ─── TRANSACTIONS ─── */
function renderTxList(){
  // filter chips
  const cats=[...new Set(txs.map(t=>t.categoryId))];
  const fr=document.getElementById('filterRow');
  fr.innerHTML=`<button class="filter-chip ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">الكل (${txs.length})</button>`
    +cats.map(cid=>{const c=CATS.find(x=>x.id===cid)||{name:cid,icon:'✨'};const cnt=txs.filter(t=>t.categoryId===cid).length;
      return `<button class="filter-chip ${activeFilter===cid?'active':''}" onclick="setFilter('${cid}')">${c.icon} ${c.name} ${cnt}</button>`;
    }).join('');

  const filtered=activeFilter==='all'?txs:txs.filter(t=>t.categoryId===activeFilter);
  document.getElementById('txCount').textContent=filtered.length;
  const list=document.getElementById('txList');
  if(!filtered.length){
    list.innerHTML=`<div class="empty"><span class="empty-icon">💳</span><h3>لا توجد معاملات</h3><p>ابدأ بإضافة أول معاملة مالية</p></div>`;return;
  }
  list.innerHTML=[...filtered].reverse().map((tx,i)=>{
    const cat=CATS.find(c=>c.id===tx.categoryId)||{icon:'✨',name:'أخرى',color:'#9ca3af'};
    const d=new Date(tx.date);
    const timeStr=d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
    const dateStr=d.toLocaleDateString('ar-EG',{month:'short',day:'numeric'});
    return `<div class="tx-item" style="animation-delay:${i*.05}s">
      <div class="tx-icon" style="background:${cat.color}22">${cat.icon}</div>
      <div class="tx-info">
        <div class="tx-name">${tx.note||cat.name}</div>
        <div class="tx-meta">
          <span class="tx-cat-badge">${cat.icon} ${cat.name}</span>
          <span>${dateStr} · ${timeStr}</span>
        </div>
      </div>
      <div class="tx-right">
        <div class="tx-amount ${tx.type==='income'?'inc':'exp'}">${tx.type==='income'?'+':'-'}${fmt(tx.amount)}</div>
      </div>
      <button class="tx-delete" onclick="deleteTx(${tx.id})" title="حذف">✕</button>
    </div>`;
  }).join('');
}

function setFilter(f){activeFilter=f;renderTxList();}

function deleteTx(id){
  txs=txs.filter(t=>t.id!==id);
  // update budget spent
  save();renderAll();toast('تم الحذف','warn');
}

/* ─── BUDGETS ─── */
function renderBudgets(){
  const bl=document.getElementById('budList');
  if(!buds.length){
    bl.innerHTML=`<div class="empty"><span class="empty-icon">🎯</span><h3>لا توجد ميزانيات</h3><p>أضف ميزانية للتحكم في مصروفاتك</p></div>`;return;
  }
  bl.innerHTML=buds.map((b,i)=>{
    const cat=CATS.find(c=>c.id===b.categoryId)||{icon:'✨',name:'أخرى',color:'#9ca3af'};
    const spent=txs.filter(t=>t.type==='expense'&&t.categoryId===b.categoryId).reduce((s,t)=>s+t.amount,0);
    const pct=Math.min((spent/b.limit)*100,100);
    const remaining=b.limit-spent;
    const fillColor=pct>=100?'var(--red)':pct>=75?'var(--amber)':'var(--green)';
    return `<div class="bud-card" style="animation-delay:${i*.07}s">
      <div class="bud-header">
        <div class="bud-icon" style="background:${cat.color}22">${cat.icon}</div>
        <div class="bud-title">${cat.name}</div>
        <div class="bud-pct" style="color:${fillColor}">${Math.round(pct)}%</div>
        <button class="tx-delete" onclick="deleteBud('${b.categoryId}')">✕</button>
      </div>
      <div class="bud-track"><div class="bud-fill" style="width:${pct}%;background:${fillColor}"></div></div>
      <div class="bud-amounts">
        <span>مصروف: <strong style="color:${fillColor}">${fmt(spent)} ج.م</strong></span>
        <span>الحد: <strong>${fmt(b.limit)} ج.م</strong></span>
      </div>
      ${remaining<0?`<div style="font-size:11px;color:var(--red);margin-top:6px;text-align:center">⚠️ تجاوزت الميزانية بـ ${fmt(Math.abs(remaining))} ج.م</div>`:''}
    </div>`;
  }).join('');
}

function deleteBud(cid){buds=buds.filter(b=>b.categoryId!==cid);save();renderBudgets();toast('تم حذف الميزانية','warn');}

/* ─── STATS ─── */
function renderStats(){
  const sg=document.getElementById('statsGrid');
  const inc=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const savingRate=inc>0?Math.round(((inc-exp)/inc)*100):0;
  const avgTx=txs.length>0?exp/txs.filter(t=>t.type==='expense').length:0;

  // Category breakdown
  const catExp=CATS.filter(c=>c.type==='expense').map(c=>({
    cat:c,total:txs.filter(t=>t.categoryId===c.id&&t.type==='expense').reduce((s,t)=>s+t.amount,0)
  })).filter(x=>x.total>0).sort((a,b)=>b.total-a.total).slice(0,5);

  // Last 7 days chart
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toDateString();
    const dayExp=txs.filter(t=>t.type==='expense'&&new Date(t.date).toDateString()===ds).reduce((s,t)=>s+t.amount,0);
    const dayNames=['أح','إث','ثل','أر','خم','جم','سب'];
    days.push({label:dayNames[d.getDay()],val:dayExp});
  }
  const maxDay=Math.max(...days.map(d=>d.val),1);

  sg.innerHTML=`
    <div class="stat-card">
      <div class="stat-card-label">معدل الادخار</div>
      <div class="stat-card-val" style="color:${savingRate>=0?'var(--green)':'var(--red)'}">${savingRate}%</div>
      <div class="stat-card-sub">${savingRate>=0?'نسبة ممتازة ✓':'مصروف أكثر من دخل'}</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">متوسط المصروف</div>
      <div class="stat-card-val" style="color:var(--amber)">${fmt(avgTx)}</div>
      <div class="stat-card-sub">ج.م للمعاملة</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">عدد المعاملات</div>
      <div class="stat-card-val" style="color:var(--accent)">${txs.length}</div>
      <div class="stat-card-sub">${txs.filter(t=>t.type==='income').length} دخل · ${txs.filter(t=>t.type==='expense').length} مصروف</div>
    </div>
    <div class="stat-card">
      <div class="stat-card-label">الميزانيات</div>
      <div class="stat-card-val" style="color:var(--accent2)">${buds.length}</div>
      <div class="stat-card-sub">فئة مراقبة</div>
    </div>
    ${days.some(d=>d.val>0)?`
    <div class="stat-card full">
      <div class="stat-card-label">المصروف - آخر 7 أيام</div>
      <div class="chart-bars">
        ${days.map(d=>`<div class="chart-bar-wrap">
          <div class="chart-bar" style="height:${(d.val/maxDay)*70+10}px;background:linear-gradient(to top,var(--accent),var(--accent2));opacity:${d.val>0?1:.3}"></div>
          <div class="chart-bar-label">${d.label}</div>
        </div>`).join('')}
      </div>
    </div>`:''}
    ${catExp.length?`
    <div class="stat-card full">
      <div class="stat-card-label">أكثر فئات الإنفاق</div>
      <div class="cat-breakdown">
        ${catExp.map(({cat,total})=>`
          <div class="cat-row">
            <div class="cat-row-icon" style="background:${cat.color}22">${cat.icon}</div>
            <div class="cat-row-name">${cat.name}</div>
            <div class="cat-row-track"><div class="cat-row-fill" style="width:${(total/catExp[0].total)*100}%;background:${cat.color}"></div></div>
            <div class="cat-row-amt" style="color:${cat.color}">${fmt(total)}</div>
          </div>`).join('')}
      </div>
    </div>`:''}
  `;
}

/* ─── ADD SHEET ─── */
function openSheet(type,subtype){
  if(type==='add'){
    curType=subtype||'expense';
    document.getElementById('typeInc').classList.toggle('active',curType==='income');
    document.getElementById('typeExp').classList.toggle('active',curType==='expense');
    selCat=curType==='income'?'salary':'food';
    renderCatGrid();
    document.getElementById('txAmt').value='';
    document.getElementById('txNote').value='';
    document.getElementById('addOverlay').classList.add('open');
  } else if(type==='budget'){
    budCat='food';
    renderBudCatGrid();
    document.getElementById('budgetAmt').value='';
    document.getElementById('budgetOverlay').classList.add('open');
  }
  document.body.style.overflow='hidden';
}

function closeSheet(id,e){
  if(!e||e.target===document.getElementById(id)){
    document.getElementById(id).classList.remove('open');
    document.body.style.overflow='';
  }
}

function setType(t){
  curType=t;
  document.getElementById('typeInc').classList.toggle('active',t==='income');
  document.getElementById('typeExp').classList.toggle('active',t==='expense');
  selCat=t==='income'?'salary':'food';
  renderCatGrid();
}

function renderCatGrid(){
  document.getElementById('catGrid').innerHTML=CATS
    .filter(c=>c.type===curType||c.type==='both')
    .map(c=>`<button class="cat-chip ${c.id===selCat?'active':''}" onclick="selCat2('${c.id}')">
        <span class="chip-icon">${c.icon}</span>${c.name}
      </button>`).join('');
}

function selCat2(id){selCat=id;renderCatGrid();}

function saveTx(){
  const amt=parseFloat(document.getElementById('txAmt').value)||0;
  if(amt<=0){toast('أدخل مبلغاً صحيحاً','err');return;}
  const note=document.getElementById('txNote').value.trim();
  txs.push({id:Date.now(),type:curType,amount:amt,categoryId:selCat,note,date:new Date().toISOString()});
  save();renderAll();
  closeSheet('addOverlay');
  document.body.style.overflow='';
  toast(curType==='income'?'تم إضافة الدخل 💰':'تم إضافة المصروف 💸','ok');

  // budget warning
  if(curType==='expense'){
    const bud=buds.find(b=>b.categoryId===selCat);
    if(bud){
      const spent=txs.filter(t=>t.type==='expense'&&t.categoryId===selCat).reduce((s,t)=>s+t.amount,0);
      const pct=(spent/bud.limit)*100;
      if(pct>=100)setTimeout(()=>toast('⚠️ تجاوزت الميزانية!','err'),3200);
      else if(pct>=80)setTimeout(()=>toast('⚠️ اقتربت من حد الميزانية','warn'),3200);
    }
  }
}

/* ─── BUDGET ─── */
function renderBudCatGrid(){
  document.getElementById('budgetCatGrid').innerHTML=CATS.filter(c=>c.type==='expense').map(c=>`
    <button class="cat-chip ${c.id===budCat?'active':''}" onclick="selBudCat('${c.id}')">
      <span class="chip-icon">${c.icon}</span>${c.name}
    </button>`).join('');
}
function selBudCat(id){budCat=id;renderBudCatGrid();}
function saveBudget(){
  const lim=parseFloat(document.getElementById('budgetAmt').value)||0;
  if(lim<=0){toast('أدخل مبلغاً صحيحاً','err');return;}
  const ex=buds.find(b=>b.categoryId===budCat);
  if(ex)ex.limit=lim;else buds.push({categoryId:budCat,limit:lim});
  save();renderBudgets();
  closeSheet('budgetOverlay');
  document.body.style.overflow='';
  toast('تم حفظ الميزانية 🎯','ok');
}

/* ─── CONFIRM / CLEAR ─── */
function showConfirm(){document.getElementById('confirmOverlay').classList.add('open');document.body.style.overflow='hidden';}
function closeConfirm(){document.getElementById('confirmOverlay').classList.remove('open');document.body.style.overflow='';}
function clearAll(){
  localStorage.removeItem(SK.tx);localStorage.removeItem(SK.bud);
  txs=[];buds=[];activeFilter='all';renderAll();
  document.getElementById('confirmOverlay').classList.remove('open');
  document.body.style.overflow='';
  toast('تم مسح كل البيانات','ok');
}

/* ─── EXPORT ─── */
function exportData(){
  const data={txs,buds,exportedAt:new Date().toISOString(),version:'2.0'};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`wallet-${new Date().toISOString().split('T')[0]}.json`;
  a.click();toast('تم التصدير 📁','ok');
}

/* ─── TOAST ─── */
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg;el.className='toast '+type+' show';
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3000);
}

/* ─── TABS ─── */
function switchTab(tab,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  document.querySelector(`[data-tab="${tab}"]`).classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  if(btn)btn.classList.add('active');
}

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
  });
});

/* ─── UTIL ─── */
function numOnly(inp){inp.value=inp.value.replace(/[^\d.]/g,'');}

/* ─── INIT ─── */
load();updateDate();renderAll();renderCatGrid();
</script>
