<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>محفظتي — Smart Wallet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   DESIGN TOKENS
═══════════════════════════════════════════ */
:root {
  /* Core Palette — Deep Space Dark */
  --bg:            #07090F;
  --bg-1:          #0D1117;
  --bg-2:          #161B27;
  --bg-3:          #1C2333;
  --bg-4:          #242E42;

  /* Accent — Violet/Indigo Primary */
  --accent:        #7C6FEB;
  --accent-2:      #9B8FF4;
  --accent-glow:   rgba(124,111,235,.35);

  /* Secondary — Cyan Teal */
  --cyan:          #22D3EE;
  --cyan-glow:     rgba(34,211,238,.2);

  /* Tertiary — Rose */
  --rose:          #F472B6;
  --rose-glow:     rgba(244,114,182,.2);

  /* Semantic */
  --green:         #34D399;
  --green-glow:    rgba(52,211,153,.2);
  --red:           #F87171;
  --red-glow:      rgba(248,113,113,.2);
  --amber:         #FBBF24;

  /* Text */
  --t1:            #EEF2FF;
  --t2:            #A8B4CC;
  --t3:            #5C6A82;
  --t4:            #2E3A4E;

  /* Borders */
  --border:        rgba(255,255,255,.07);
  --border-2:      rgba(255,255,255,.12);

  /* Radius */
  --r-sm:          .75rem;
  --r:             1rem;
  --r-lg:          1.5rem;
  --r-xl:          2rem;

  /* Font */
  font-family: 'Cairo', sans-serif;
}

/* ═══════════════════════════════════════════
   RESET + BASE
═══════════════════════════════════════════ */
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--t1);
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
button { cursor:pointer; font-family:inherit; border:none; background:none; }
input  { font-family:inherit; color:inherit; }
a { text-decoration:none; color:inherit; }

/* ═══════════════════════════════════════════
   CANVAS BACKGROUND
═══════════════════════════════════════════ */
#canvas-bg {
  position: fixed; inset:0; z-index:0;
  pointer-events:none;
}

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
.app {
  position: relative;
  z-index: 1;
  max-width: 26rem;
  margin: 0 auto;
  padding: 1.5rem 1.25rem 7rem;
}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 1.75rem;
  animation: fadeDown .5s ease both;
}
.header-left { display:flex; align-items:center; gap:.75rem; }
.logo-mark {
  width: 2.75rem; height: 2.75rem;
  border-radius: var(--r-sm);
  background: linear-gradient(135deg, var(--accent), #B372D8);
  display: flex; align-items:center; justify-content:center;
  box-shadow: 0 0 20px var(--accent-glow), inset 0 1px 0 rgba(255,255,255,.15);
  position: relative; overflow: hidden;
}
.logo-mark::after {
  content:'';
  position:absolute; inset:0;
  background: linear-gradient(135deg, rgba(255,255,255,.15) 0%, transparent 60%);
}
.logo-mark svg { position:relative; z-index:1; }
.header-title { font-size:1.25rem; font-weight:800; letter-spacing:-.02em; }
.header-sub { font-size:.75rem; color:var(--t3); margin-top:.1rem; }
.header-actions { display:flex; gap:.5rem; align-items:center; }
.h-btn {
  width:2.375rem; height:2.375rem;
  border-radius:var(--r-sm);
  background: var(--bg-3);
  border: 1px solid var(--border);
  color: var(--t3);
  display:flex; align-items:center; justify-content:center;
  transition: all .25s;
  position:relative;
}
.h-btn:hover { background:var(--bg-4); border-color:var(--border-2); color:var(--t1); }
.h-btn.red:hover { background:var(--red-glow); border-color:var(--red); color:var(--red); }
.h-avatar {
  width:2.375rem; height:2.375rem;
  border-radius:var(--r-sm);
  background: linear-gradient(135deg, var(--accent), #B372D8);
  display:flex; align-items:center; justify-content:center;
  font-weight:800; font-size:.875rem;
  box-shadow: 0 0 15px var(--accent-glow);
  cursor:pointer; transition: transform .2s;
}
.h-avatar:hover { transform: scale(1.08); }

/* ═══════════════════════════════════════════
   BALANCE CARD
═══════════════════════════════════════════ */
.balance-card {
  position: relative;
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 1.75rem;
  margin-bottom: 1rem;
  overflow: hidden;
  animation: fadeUp .5s .1s ease both;
}
.balance-card-shine {
  position:absolute; top:-50%; left:-50%;
  width:200%; height:200%;
  background: conic-gradient(from 0deg at 30% 30%,
    transparent 0deg,
    rgba(124,111,235,.06) 60deg,
    transparent 120deg,
    rgba(34,211,238,.04) 180deg,
    transparent 240deg
  );
  animation: spin 20s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.balance-card-inner { position:relative; z-index:1; }
.bc-label {
  display:flex; align-items:center; gap:.5rem;
  font-size:.75rem; color:var(--t3); margin-bottom:.75rem;
  text-transform:uppercase; letter-spacing:.08em; font-weight:600;
}
.bc-label-dot {
  width:.5rem; height:.5rem; border-radius:50%;
  background: var(--green); box-shadow: 0 0 6px var(--green);
  animation: pulse-dot 2s ease infinite;
}
@keyframes pulse-dot {
  0%,100% { transform:scale(1); opacity:1; }
  50% { transform:scale(1.4); opacity:.7; }
}
.bc-amount {
  font-size:3rem; font-weight:900;
  letter-spacing:-.04em;
  background: linear-gradient(135deg, var(--t1), var(--accent-2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom:1.25rem;
  font-variant-numeric: tabular-nums;
  transition: all .5s;
}
.bc-row {
  display:flex; gap:1.25rem;
}
.bc-stat {
  flex:1;
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: .875rem;
  transition: border-color .2s;
}
.bc-stat:hover { border-color: var(--border-2); }
.bc-stat-top {
  display:flex; align-items:center; gap:.5rem;
  margin-bottom:.375rem;
}
.bc-stat-icon {
  width:1.625rem; height:1.625rem;
  border-radius:.5rem;
  display:flex; align-items:center; justify-content:center;
}
.bc-stat-icon.income { background:var(--green-glow); color:var(--green); }
.bc-stat-icon.expense { background:var(--red-glow); color:var(--red); }
.bc-stat-label { font-size:.7rem; color:var(--t3); font-weight:600; text-transform:uppercase; letter-spacing:.05em; }
.bc-stat-value { font-size:1rem; font-weight:700; font-variant-numeric:tabular-nums; }
.bc-stat-value.income { color:var(--green); }
.bc-stat-value.expense { color:var(--red); }

/* ═══════════════════════════════════════════
   MINI STATS ROW
═══════════════════════════════════════════ */
.mini-stats {
  display:grid; grid-template-columns:1fr 1fr;
  gap:.75rem; margin-bottom:1.5rem;
}
.mini-stat {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 1rem;
  position: relative; overflow:hidden;
  animation: fadeUp .5s ease both;
  transition: border-color .2s, transform .2s;
}
.mini-stat:hover { border-color:var(--border-2); transform:translateY(-2px); }
.mini-stat:nth-child(1) { animation-delay:.15s; }
.mini-stat:nth-child(2) { animation-delay:.2s; }
.mini-stat-glow {
  position:absolute; bottom:-2rem; right:-2rem;
  width:5rem; height:5rem; border-radius:50%;
  filter:blur(2rem); opacity:.3;
}
.mini-stat-icon {
  width:2rem; height:2rem; border-radius:.625rem;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:.625rem;
}
.mini-stat-label { font-size:.7rem; color:var(--t3); font-weight:600; text-transform:uppercase; letter-spacing:.05em; margin-bottom:.25rem; }
.mini-stat-value { font-size:1.375rem; font-weight:800; font-variant-numeric:tabular-nums; }

/* ═══════════════════════════════════════════
   TABS
═══════════════════════════════════════════ */
.tabs-wrap {
  display:flex; gap:.375rem;
  background:var(--bg-2); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:.375rem;
  margin-bottom:1.5rem;
  animation: fadeUp .5s .25s ease both;
}
.tab-btn {
  flex:1; display:flex; align-items:center; justify-content:center;
  gap:.4rem; padding:.625rem .5rem;
  border-radius:var(--r);
  font-size:.8rem; font-weight:700;
  color:var(--t3); transition:all .3s;
  white-space:nowrap;
}
.tab-btn svg { flex-shrink:0; }
.tab-btn.active {
  background: var(--bg-4);
  color: var(--t1);
  box-shadow: 0 2px 12px rgba(0,0,0,.3), inset 0 1px 0 rgba(255,255,255,.06);
}
.tab-btn.active svg { color:var(--accent); }

/* ═══════════════════════════════════════════
   TAB CONTENT
═══════════════════════════════════════════ */
.tab-panel { display:none; animation: fadeUp .3s ease both; }
.tab-panel.active { display:block; }

/* ═══════════════════════════════════════════
   SECTION
═══════════════════════════════════════════ */
.section { margin-bottom:1.25rem; }
.section-header {
  display:flex; justify-content:space-between; align-items:center;
  margin-bottom:.75rem;
}
.section-title {
  font-size:.8rem; font-weight:700;
  color:var(--t2); text-transform:uppercase; letter-spacing:.06em;
  display:flex; align-items:center; gap:.5rem;
}
.section-title-dot { width:.375rem; height:.375rem; border-radius:50%; background:var(--accent); }
.section-action {
  font-size:.75rem; font-weight:600; color:var(--accent);
  display:flex; align-items:center; gap:.25rem;
  padding:.375rem .625rem; border-radius:var(--r-sm);
  background:var(--accent-glow); border:1px solid rgba(124,111,235,.2);
  transition:all .2s;
}
.section-action:hover { background:rgba(124,111,235,.2); }

/* ═══════════════════════════════════════════
   CHART CARD
═══════════════════════════════════════════ */
.chart-card {
  background:var(--bg-2); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:1.25rem;
  transition:border-color .2s;
}
.chart-card:hover { border-color:var(--border-2); }
.chart-wrap {
  display:flex; align-items:center; gap:1.25rem;
}
.pie-wrap {
  width:9rem; height:9rem; flex-shrink:0;
  position:relative;
}
.pie-wrap svg { transform:rotate(-90deg); overflow:visible; }
.pie-center {
  position:absolute; inset:0;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
}
.pie-center-val { font-size:.9375rem; font-weight:800; font-variant-numeric:tabular-nums; }
.pie-center-sub { font-size:.625rem; color:var(--t3); }
.legend { flex:1; min-width:0; }
.legend-item {
  display:flex; align-items:center;
  gap:.5rem; margin-bottom:.5rem;
  animation: fadeIn .4s ease both;
}
.legend-dot {
  width:.5rem; height:.5rem; border-radius:50%;
  flex-shrink:0; box-shadow:0 0 4px currentColor;
}
.legend-label { flex:1; font-size:.75rem; color:var(--t2); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.legend-pct { font-size:.7rem; color:var(--t3); margin-left:.25rem; }
.legend-val { font-size:.75rem; font-weight:700; font-variant-numeric:tabular-nums; }
.chart-empty {
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:2rem; gap:.75rem;
  color:var(--t3);
}
.chart-empty-icon { font-size:2.5rem; opacity:.4; }
.chart-empty-text { font-size:.8rem; }

/* ═══════════════════════════════════════════
   TRANSACTIONS
═══════════════════════════════════════════ */
.tx-list { display:flex; flex-direction:column; gap:.375rem; }
.tx-item {
  display:flex; align-items:center; gap:.75rem;
  padding:.875rem .875rem;
  background:var(--bg-2); border:1px solid var(--border);
  border-radius:var(--r);
  position:relative; overflow:hidden;
  cursor:default;
  transition:all .25s;
  animation: fadeUp .3s ease both;
}
.tx-item:hover { border-color:var(--border-2); transform:translateX(-2px); }
.tx-del {
  position:absolute; left:.625rem; top:50%; transform:translateY(-50%);
  width:1.75rem; height:1.75rem; border-radius:.5rem;
  background:var(--red-glow); color:var(--red);
  display:flex; align-items:center; justify-content:center;
  opacity:0; transition:opacity .2s;
  font-size:.75rem;
}
.tx-item:hover .tx-del { opacity:1; }
.tx-icon {
  width:2.375rem; height:2.375rem; border-radius:var(--r-sm);
  display:flex; align-items:center; justify-content:center;
  font-size:1.125rem; flex-shrink:0;
  position:relative;
}
.tx-icon-ring {
  position:absolute; inset:0; border-radius:var(--r-sm);
  border:1px solid rgba(255,255,255,.06);
}
.tx-info { flex:1; min-width:0; }
.tx-name { font-size:.875rem; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tx-time { font-size:.7rem; color:var(--t3); margin-top:.125rem; }
.tx-right { text-align:left; flex-shrink:0; padding-left:1.75rem; }
.tx-amount { font-size:.875rem; font-weight:700; font-variant-numeric:tabular-nums; }
.tx-amount.plus { color:var(--green); }
.tx-amount.minus { color:var(--t1); }
.tx-cat { font-size:.65rem; color:var(--t3); margin-top:.1rem; text-align:left; }
.tx-empty {
  background:var(--bg-2); border:1px solid var(--border);
  border-radius:var(--r-lg);
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:2.5rem; gap:.75rem;
  color:var(--t3);
}
.tx-empty-icon { font-size:2.5rem; opacity:.4; }
.tx-empty-text { font-size:.8rem; }

/* ═══════════════════════════════════════════
   INSIGHTS
═══════════════════════════════════════════ */
.insight {
  display:flex; gap:.875rem; padding:1rem;
  border-radius:var(--r-lg); margin-bottom:.75rem;
  border:1px solid transparent; transition:transform .2s;
  animation: fadeUp .3s ease both;
}
.insight:hover { transform:translateY(-2px); }
.insight.warn  { background:rgba(251,191,36,.07);  border-color:rgba(251,191,36,.2); }
.insight.tip   { background:rgba(34,211,238,.07);  border-color:rgba(34,211,238,.2); }
.insight.win   { background:rgba(52,211,153,.07);  border-color:rgba(52,211,153,.2); }
.insight.info  { background:rgba(124,111,235,.07); border-color:rgba(124,111,235,.2); }
.insight-icon { font-size:1.5rem; flex-shrink:0; margin-top:.1rem; }
.insight-title { font-size:.875rem; font-weight:700; margin-bottom:.25rem; }
.insight-msg   { font-size:.75rem; color:var(--t2); line-height:1.6; }

/* ═══════════════════════════════════════════
   BUDGETS
═══════════════════════════════════════════ */
.budget-item {
  display:flex; align-items:center; gap:1rem;
  background:var(--bg-2); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:1rem;
  margin-bottom:.75rem; transition:all .25s;
  animation: fadeUp .3s ease both;
}
.budget-item:hover { border-color:var(--border-2); transform:translateY(-2px); }
.budget-ring { position:relative; width:4.5rem; height:4.5rem; flex-shrink:0; }
.budget-ring svg { transform:rotate(-90deg); }
.budget-ring-num {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center;
  font-size:.8rem; font-weight:800; font-variant-numeric:tabular-nums;
}
.budget-info { flex:1; min-width:0; }
.budget-head {
  display:flex; align-items:center; gap:.5rem;
  margin-bottom:.25rem;
}
.budget-name { font-size:.875rem; font-weight:600; }
.budget-badge {
  font-size:.6rem; font-weight:700; padding:.15rem .4rem;
  border-radius:.375rem; background:var(--red-glow); color:var(--red);
  border:1px solid rgba(248,113,113,.2);
}
.budget-sub { font-size:.7rem; color:var(--t3); margin-bottom:.25rem; }
.budget-remaining { font-size:.75rem; font-weight:700; }
.budget-remaining.ok  { color:var(--green); }
.budget-remaining.bad { color:var(--red); }
.budget-empty {
  background:var(--bg-2); border:1px solid var(--border);
  border-radius:var(--r-lg);
  display:flex; flex-direction:column; align-items:center;
  justify-content:center; padding:2.5rem; gap:.75rem;
  color:var(--t3);
}
.budget-empty-icon { font-size:2.5rem; opacity:.4; }
.budget-empty-text { font-size:.8rem; }

/* ═══════════════════════════════════════════
   FAB
═══════════════════════════════════════════ */
.fab {
  position:fixed; bottom:1.75rem; left:50%; transform:translateX(-50%);
  width:3.75rem; height:3.75rem; border-radius:var(--r-lg);
  background: linear-gradient(135deg, var(--accent), #9B3DDA);
  box-shadow: 0 0 0 0 var(--accent-glow), 0 8px 30px rgba(124,111,235,.4);
  color:#fff; font-size:1.5rem;
  display:flex; align-items:center; justify-content:center;
  z-index:50; transition:all .3s;
  animation: fab-in .5s .3s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes fab-in {
  from { transform:translateX(-50%) scale(0) rotate(-45deg); opacity:0; }
  to   { transform:translateX(-50%) scale(1) rotate(0deg);   opacity:1; }
}
.fab:hover {
  transform: translateX(-50%) scale(1.08);
  box-shadow: 0 0 0 8px rgba(124,111,235,.15), 0 12px 35px rgba(124,111,235,.5);
}
.fab:active { transform:translateX(-50%) scale(.95); }

/* ═══════════════════════════════════════════
   MODAL OVERLAY
═══════════════════════════════════════════ */
.overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,.7);
  backdrop-filter:blur(.5rem);
  z-index:100; opacity:0; visibility:hidden;
  transition:all .3s;
}
.overlay.open { opacity:1; visibility:visible; }

.sheet {
  position:fixed; bottom:0; left:0; right:0;
  background: var(--bg-1);
  border-top:1px solid var(--border-2);
  border-radius:var(--r-xl) var(--r-xl) 0 0;
  padding:1.5rem 1.25rem 2rem;
  z-index:101; max-width:26rem; margin:0 auto;
  transform:translateY(110%);
  transition:transform .35s cubic-bezier(.32,0,.67,0);
}
.overlay.open .sheet {
  transform:translateY(0);
  transition:transform .35s cubic-bezier(.33,1,.68,1);
}
.sheet-handle {
  width:3rem; height:.25rem;
  background:var(--bg-4); border-radius:9999px;
  margin:0 auto 1.5rem;
}
.sheet-title {
  font-size:1.0625rem; font-weight:800;
  text-align:center; margin-bottom:1.25rem;
  letter-spacing:-.01em;
}

/* Amount input */
.amt-wrap {
  background:var(--bg-3); border:1px solid var(--border);
  border-radius:var(--r-lg); padding:1.25rem;
  text-align:center; margin-bottom:1rem;
  transition:border-color .2s;
}
.amt-wrap:focus-within { border-color:var(--accent); }
.amt-currency { font-size:.8rem; color:var(--t3); font-weight:600; letter-spacing:.04em; text-transform:uppercase; margin-bottom:.375rem; }
.amt-input {
  width:100%; background:transparent; border:none;
  font-size:2.5rem; font-weight:900; text-align:center;
  color:var(--t1); letter-spacing:-.03em;
  font-variant-numeric:tabular-nums;
}
.amt-input:focus { outline:none; }
.amt-input::placeholder { color:var(--t4); }

/* Type toggle */
.type-toggle {
  display:flex; background:var(--bg-3); border:1px solid var(--border);
  border-radius:var(--r); padding:.25rem; gap:.25rem;
  margin-bottom:1rem;
}
.type-opt {
  flex:1; padding:.625rem; border-radius:var(--r-sm);
  font-size:.8rem; font-weight:700;
  color:var(--t3); transition:all .25s;
  display:flex; align-items:center; justify-content:center; gap:.375rem;
}
.type-opt.active-exp {
  background:var(--red-glow); color:var(--red);
  border:1px solid rgba(248,113,113,.2);
}
.type-opt.active-inc {
  background:var(--green-glow); color:var(--green);
  border:1px solid rgba(52,211,153,.2);
}

/* Category chips */
.cat-grid {
  display:flex; flex-wrap:wrap; gap:.375rem;
  margin-bottom:1rem;
}
.cat-chip {
  display:flex; align-items:center; gap:.375rem;
  padding:.5rem .75rem; border-radius:.75rem;
  font-size:.75rem; font-weight:600;
  background:var(--bg-3); border:1px solid var(--border);
  color:var(--t2); transition:all .2s;
}
.cat-chip:hover { border-color:var(--border-2); color:var(--t1); }
.cat-chip.active {
  background:rgba(124,111,235,.15);
  border-color:rgba(124,111,235,.4);
  color:var(--accent-2);
}

/* Desc input */
.desc-inp {
  width:100%; background:var(--bg-3);
  border:1px solid var(--border);
  border-radius:var(--r); padding:.875rem 1rem;
  font-size:.875rem; color:var(--t1);
  margin-bottom:1rem; transition:border-color .2s;
}
.desc-inp:focus { outline:none; border-color:var(--accent); }
.desc-inp::placeholder { color:var(--t3); }

/* Submit */
.submit {
  width:100%; padding:1rem;
  border-radius:var(--r-lg);
  background: linear-gradient(135deg, var(--accent), #9B3DDA);
  color:#fff; font-size:.9375rem; font-weight:800;
  box-shadow:0 8px 25px rgba(124,111,235,.35);
  transition:all .25s; letter-spacing:-.01em;
}
.submit:hover { box-shadow:0 12px 35px rgba(124,111,235,.45); transform:translateY(-1px); }
.submit:active { transform:translateY(0); }

/* ═══════════════════════════════════════════
   CONFIRM DIALOG
═══════════════════════════════════════════ */
.dialog-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,.75); backdrop-filter:blur(.5rem);
  z-index:200; opacity:0; visibility:hidden; transition:all .25s;
  display:flex; align-items:center; justify-content:center; padding:1.25rem;
}
.dialog-overlay.open { opacity:1; visibility:visible; }
.dialog {
  background:var(--bg-2); border:1px solid var(--border-2);
  border-radius:var(--r-xl); padding:1.75rem;
  max-width:22rem; width:100%; text-align:center;
  transform:scale(.9) translateY(1rem); transition:transform .25s;
}
.dialog-overlay.open .dialog { transform:scale(1) translateY(0); }
.dialog-emoji { font-size:2.75rem; margin-bottom:1rem; }
.dialog-title { font-size:1.0625rem; font-weight:800; margin-bottom:.5rem; }
.dialog-msg { font-size:.8125rem; color:var(--t3); line-height:1.6; margin-bottom:1.5rem; }
.dialog-btns { display:flex; gap:.625rem; }
.dialog-cancel {
  flex:1; padding:.875rem; border-radius:var(--r);
  background:var(--bg-3); color:var(--t2);
  font-size:.875rem; font-weight:700; transition:all .2s;
}
.dialog-cancel:hover { background:var(--bg-4); color:var(--t1); }
.dialog-confirm {
  flex:1; padding:.875rem; border-radius:var(--r);
  background:var(--red-glow); color:var(--red);
  border:1px solid rgba(248,113,113,.25);
  font-size:.875rem; font-weight:700; transition:all .2s;
}
.dialog-confirm:hover { background:rgba(248,113,113,.2); }

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
.toast {
  position:fixed; bottom:5.5rem; left:50%;
  transform:translateX(-50%) translateY(1.5rem);
  background:var(--bg-3); border:1px solid var(--border-2);
  border-radius:var(--r); padding:.6875rem 1.25rem;
  font-size:.8125rem; font-weight:600;
  z-index:300; opacity:0; transition:all .3s; white-space:nowrap;
  display:flex; align-items:center; gap:.5rem;
}
.toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
.toast.ok  { border-color:rgba(52,211,153,.3); color:var(--green); }
.toast.err { border-color:rgba(248,113,113,.3); color:var(--red); }

/* ═══════════════════════════════════════════
   KEYFRAMES
═══════════════════════════════════════════ */
@keyframes fadeUp   { from { opacity:0; transform:translateY(1.25rem); } to { opacity:1; transform:translateY(0); } }
@keyframes fadeDown { from { opacity:0; transform:translateY(-1rem);   } to { opacity:1; transform:translateY(0); } }
@keyframes fadeIn   { from { opacity:0; } to { opacity:1; } }

/* ═══════════════════════════════════════════
   SCROLLBAR
═══════════════════════════════════════════ */
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-thumb { background:var(--bg-4); border-radius:9999px; }

/* ═══════════════════════════════════════════

@media(max-width:360px) {
  .bc-amount { font-size:2.25rem; }
  .tabs-wrap .tab-btn span.tab-label { display:none; }
}
</style>

<script>
/* ─── PARTICLE CANVAS ─── */
(function(){
  const c = document.getElementById('canvas-bg');
  const ctx = c.getContext('2d');
  let W, H, pts = [];
  function resize(){
    W = c.width  = window.innerWidth;
    H = c.height = window.innerHeight;
  }
  function mkPt(){
    return {
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3,
      r:Math.random()*1.5+.5,
      op:Math.random()*.4+.1
    };
  }
  resize(); window.addEventListener('resize',resize);
  for(let i=0;i<60;i++) pts.push(mkPt());
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx; p.y+=p.vy;
      if(p.x<0||p.x>W) p.vx*=-1;
      if(p.y<0||p.y>H) p.vy*=-1;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(124,111,235,${p.op})`;
      ctx.fill();
    });
    // connections
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y;
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d<120){
          ctx.beginPath();
          ctx.moveTo(pts[i].x,pts[i].y);
          ctx.lineTo(pts[j].x,pts[j].y);
          ctx.strokeStyle=`rgba(124,111,235,${.08*(1-d/120)})`;
          ctx.lineWidth=.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

/* ─── DATA ─── */
const CATS = [
  {id:'food',       name:'أكل', icon:'🍽️', color:'#FBBF24', type:'expense'},
  {id:'transport',  name:'مواصلات', icon:'🚗', color:'#38BDF8', type:'expense'},
  {id:'shopping',   name:'شوبينج', icon:'🛍️', color:'#F472B6', type:'expense'},
  {id:'entertainment',name:'ترفيه', icon:'🎮', color:'#A78BFA', type:'expense'},
  {id:'bills',      name:'فواتير', icon:'📄', color:'#F87171', type:'expense'},
  {id:'health',     name:'صحة', icon:'❤️', color:'#34D399', type:'expense'},
  {id:'salary',     name:'مرتب', icon:'💰', color:'#34D399', type:'income'},
  {id:'freelance',  name:'فري لانس', icon:'💻', color:'#818CF8', type:'income'},
  {id:'gift',       name:'هدية', icon:'🎁', color:'#F472B6', type:'income'},
];

const SK = { tx:'wt_tx', bud:'wt_bud' };
let txs=[], buds=[], txType='expense', txCat='food', budCat='food';

function save(){ localStorage.setItem(SK.tx,JSON.stringify(txs)); localStorage.setItem(SK.bud,JSON.stringify(buds)); }
function load(){
  const t=localStorage.getItem(SK.tx), b=localStorage.getItem(SK.bud);
  if(t) txs=JSON.parse(t).map(x=>({...x,date:new Date(x.date)}));
  if(b) buds=JSON.parse(b);
}

function cat(id){ return CATS.find(c=>c.id===id)||CATS[0]; }
function fmt(n){ return new Intl.NumberFormat('ar-EG').format(Math.abs(n))+' ج.م'; }
function relTime(d){
  const m=Math.floor((Date.now()-new Date(d))/60000);
  if(m<1) return 'الآن';
  if(m<60) return `منذ ${m} دقيقة`;
  const h=Math.floor(m/60);
  if(h<24) return `منذ ${h} ساعة`;
  const dy=Math.floor(h/24);
  if(dy===1) return 'أمس';
  if(dy<7) return `منذ ${dy} أيام`;
  return new Date(d).toLocaleDateString('ar-EG',{month:'short',day:'numeric'});
}

/* ─── HEADER DATE ─── */
function updateDate(){
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('ar-EG',{weekday:'long',month:'long',day:'numeric'});
}

/* ─── STATS ─── */
function renderStats(){
  const inc = txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp = txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal = inc - exp;
  const sr = inc>0 ? ((inc-exp)/inc*100).toFixed(1) : 0;

  animNum('balanceAmt', bal, true);
  animNum('incomeTotal', inc, false, true);
  animNum('expenseTotal', exp, false, false, true);
  document.getElementById('savingRate').textContent = sr+'%';
  document.getElementById('txCount').textContent = txs.length;
}

function animNum(id, val, bal=false, inc=false, exp=false){
  const el = document.getElementById(id);
  const target = Math.abs(val);
  const formatted = fmt(target) + (bal && val<0 ? ' (عليك)' : '');
  el.textContent = formatted;
}

/* ─── CHART ─── */
function renderChart(){
  const wrap = document.getElementById('chartWrap');
  const expenses = txs.filter(t=>t.type==='expense');
  if(!expenses.length){
    wrap.innerHTML=`<div class="chart-empty"><div class="chart-empty-icon">📊</div><div class="chart-empty-text">مفيش مصاريف لسه — ضيف أول عملية!</div></div>`;
    return;
  }
  const byCat={};
  expenses.forEach(t=>{ byCat[t.category]=(byCat[t.category]||0)+t.amount; });
  const total=Object.values(byCat).reduce((s,v)=>s+v,0);
  const sorted=Object.entries(byCat).sort((a,b)=>b[1]-a[1]).slice(0,5);
  const R=40, C=2*Math.PI*R;
  let off=0;
  const segs=sorted.map(([cid,amt])=>{
    const c2=cat(cid), pct=amt/total, dash=pct*C;
    const s={color:c2.color, arr:`${dash} ${C}`, off:-off, pct:(pct*100).toFixed(0)};
    off+=dash; return {s,c:c2,amt};
  });
  wrap.innerHTML=`<div class="chart-wrap">
    <div class="pie-wrap">
      <svg viewBox="0 0 100 100" width="100%" height="100%">
        <circle cx="50" cy="50" r="${R}" fill="none" stroke="rgba(255,255,255,.05)" stroke-width="14"/>
        ${segs.map(({s})=>`
          <circle cx="50" cy="50" r="${R}" fill="none"
            stroke="${s.color}" stroke-width="14"
            stroke-dasharray="${s.arr}"
            stroke-dashoffset="${s.off}"
            stroke-linecap="round"
          />`).join('')}
      </svg>
      <div class="pie-center">
        <span class="pie-center-val">${new Intl.NumberFormat('ar-EG').format(Math.round(total))}</span>
        <span class="pie-center-sub">ج.م إجمالي</span>
      </div>
    </div>
    <div class="legend">
      ${segs.map(({s,c:c2,amt})=>`
        <div class="legend-item">
          <div class="legend-dot" style="background:${s.color};color:${s.color}"></div>
          <span class="legend-label">${c2.icon} ${c2.name}</span>
          <span class="legend-pct">${s.pct}%</span>
          <span class="legend-val">${fmt(amt)}</span>
        </div>`).join('')}
    </div>
  </div>`;
}

/* ─── TRANSACTIONS ─── */
function renderTx(){
  const el=document.getElementById('txList');
  if(!txs.length){
    el.innerHTML=`<div class="tx-empty"><div class="tx-empty-icon">💳</div><div class="tx-empty-text">لا يوجد عمليات — اضغط + لإضافة أول واحدة</div></div>`;
    return;
  }
  const sorted=[...txs].sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,12);
  el.innerHTML=sorted.map((t,i)=>{
    const c=cat(t.category);
    return `<div class="tx-item" style="animation-delay:${i*.04}s">
      <button class="tx-del" onclick="delTx(${t.id})">✕</button>
      <div class="tx-icon" style="background:${c.color}18">
        <div class="tx-icon-ring"></div>
        <span>${c.icon}</span>
      </div>
      <div class="tx-info">
        <div class="tx-name">${t.desc||c.name}</div>
        <div class="tx-time">${relTime(t.date)}</div>
      </div>
      <div class="tx-right">
        <div class="tx-amount ${t.type==='income'?'plus':'minus'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
        <div class="tx-cat">${c.name}</div>
      </div>
    </div>`;
  }).join('');
}

/* ─── INSIGHTS ─── */
function renderInsights(){
  const el=document.getElementById('insightsList');
  const ins=[];
  const inc=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  buds.forEach(b=>{
    const p=b.spent/b.limit*100, c=cat(b.categoryId);
    if(p>100) ins.push({type:'warn',icon:'🚨',title:`تجاوزت ميزانية ${c.name}!`,msg:`صرفت ${Math.round(p)}% من الميزانية المحددة. المبلغ الزيادة: ${fmt(b.spent-b.limit)}`});
    else if(p>80) ins.push({type:'warn',icon:'⚠️',title:`تحذير: ${c.name}`,msg:`وصلت لـ ${Math.round(p)}% من ميزانية ${c.name}. باقي ${fmt(b.limit-b.spent)} فقط.`});
  });

  if(inc>0){
    const sr=(inc-exp)/inc*100;
    if(sr>=30) ins.push({type:'win',icon:'🏆',title:'أداء مالي ممتاز!',msg:`توفير ${sr.toFixed(0)}% من دخلك. استمر وفكر في الاستثمار!`});
    else if(sr<0) ins.push({type:'warn',icon:'📉',title:'تحذير: صرف زيادة عن الدخل',msg:`صرفت ${fmt(exp-inc)} أكتر من دخلك. خلي بالك!`});
    else if(sr<10) ins.push({type:'tip',icon:'💡',title:'نصيحة: زود معدل التوفير',msg:'حاول توفر على الأقل 20% من دخلك. قلل مصاريف الترفيه.'});
  }

  // Top category
  const byCat={};
  txs.filter(t=>t.type==='expense').forEach(t=>{ byCat[t.category]=(byCat[t.category]||0)+t.amount; });
  const topCat=Object.entries(byCat).sort((a,b)=>b[1]-a[1])[0];
  if(topCat && exp>0){
    const c=cat(topCat[0]);
    ins.push({type:'info',icon:'📊',title:`${c.icon} أكبر مصروف: ${c.name}`,msg:`صرفت ${fmt(topCat[1])} على ${c.name} (${(topCat[1]/exp*100).toFixed(0)}% من إجمالي المصاريف).`});
  }

  if(!ins.length) ins.push({type:'tip',icon:'🌟',title:'ابدأ رحلتك المالية',msg:'ضيف عملياتك اليومية وسنعطيك تحليلات وتوصيات مخصصة لك.'});

  el.innerHTML=ins.slice(0,5).map((i,idx)=>`
    <div class="insight ${i.type}" style="animation-delay:${idx*.08}s">
      <div class="insight-icon">${i.icon}</div>
      <div>
        <div class="insight-title">${i.title}</div>
        <div class="insight-msg">${i.msg}</div>
      </div>
    </div>`).join('');
}

/* ─── BUDGETS ─── */
function renderBudgets(){
  const el=document.getElementById('budgetsList');
  if(!buds.length){
    el.innerHTML=`<div class="budget-empty"><div class="budget-empty-icon">🎯</div><div class="budget-empty-text">لا توجد ميزانيات — أضف ميزانية لكل فئة</div></div>`;
    return;
  }
  const R=35, C=2*Math.PI*R;
  el.innerHTML=buds.map((b,i)=>{
    const c=cat(b.categoryId), p=Math.min(b.spent/b.limit,1), isOver=b.spent>b.limit;
    const filled=p*C, offset=C-filled;
    const rem=b.limit-b.spent;
    return `<div class="budget-item" style="animation-delay:${i*.07}s">
      <div class="budget-ring">
        <svg viewBox="0 0 100 100" width="100%" height="100%">
          <circle cx="50" cy="50" r="${R}" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="9"/>
          <circle cx="50" cy="50" r="${R}" fill="none"
            stroke="${isOver?'#F87171':c.color}" stroke-width="9"
            stroke-linecap="round"
            stroke-dasharray="${C}"
            stroke-dashoffset="${offset}"/>
        </svg>
        <div class="budget-ring-num" style="color:${isOver?'#F87171':c.color}">${Math.round(p*100)}%</div>
      </div>
      <div class="budget-info">
        <div class="budget-head">
          <span class="budget-name">${c.icon} ${c.name}</span>
          ${isOver?'<span class="budget-badge">تجاوزت!</span>':''}
        </div>
        <div class="budget-sub">صُرف ${fmt(b.spent)} من ${fmt(b.limit)}</div>
        <div class="budget-remaining ${isOver?'bad':'ok'}">${isOver?'زيادة '+fmt(Math.abs(rem)):'متبقي '+fmt(rem)}</div>
      </div>
    </div>`;
  }).join('');
}

/* ─── RENDER ALL ─── */
function renderAll(){ renderStats(); renderChart(); renderTx(); renderInsights(); renderBudgets(); }

/* ─── TX SHEET ─── */
function openTxSheet(){
  renderCatGrid();
  document.getElementById('txOverlay').classList.add('open');
  document.body.style.overflow='hidden';
  setTimeout(()=>document.getElementById('txAmount').focus(),400);
}
function closeTxSheet(e){
  if(e.target===document.getElementById('txOverlay')){
    document.getElementById('txOverlay').classList.remove('open');
    document.body.style.overflow='';
  }
}
function setTxType(t){
  txType=t;
  document.getElementById('optExp').className='type-opt'+(t==='expense'?' active-exp':'');
  document.getElementById('optInc').className='type-opt'+(t==='income'?' active-inc':'');
  txCat=CATS.find(c=>c.type===t)?.id||txCat;
  renderCatGrid();
}
function renderCatGrid(){
  document.getElementById('txCatGrid').innerHTML=CATS.filter(c=>c.type===txType).map(c=>`
    <button class="cat-chip ${c.id===txCat?'active':''}" onclick="selCat('${c.id}')">
      ${c.icon} ${c.name}
    </button>`).join('');
}
function selCat(id){ txCat=id; renderCatGrid(); }
function saveTx(){
  const amt=parseFloat(document.getElementById('txAmount').value)||0;
  if(amt<=0){ toast('ضيف مبلغ صحيح','err'); return; }
  const tx={id:Date.now(),amount:amt,category:txCat,
    desc:document.getElementById('txDesc').value||cat(txCat).name,
    date:new Date(),type:txType};
  txs.unshift(tx);
  if(txType==='expense'){
    const b=buds.find(b=>b.categoryId===txCat);
    if(b) b.spent+=amt;
  }
  save(); renderAll();
  document.getElementById('txOverlay').classList.remove('open');
  document.body.style.overflow='';
  document.getElementById('txAmount').value='';
  document.getElementById('txDesc').value='';
  toast('تم حفظ العملية ✓','ok');
}
function delTx(id){
  const t=txs.find(x=>x.id===id);
  if(t&&t.type==='expense'){
    const b=buds.find(b=>b.categoryId===t.category);
    if(b) b.spent=Math.max(0,b.spent-t.amount);
  }
  txs=txs.filter(x=>x.id!==id);
  save(); renderAll(); toast('تم الحذف','ok');
}

/* ─── BUDGET SHEET ─── */
function openBudgetSheet(){
  renderBudCatGrid();
  document.getElementById('budgetOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeBudgetSheet(e){
  if(e.target===document.getElementById('budgetOverlay')){
    document.getElementById('budgetOverlay').classList.remove('open');
    document.body.style.overflow='';
  }
}
function renderBudCatGrid(){
  document.getElementById('budgetCatGrid').innerHTML=CATS.filter(c=>c.type==='expense').map(c=>`
    <button class="cat-chip ${c.id===budCat?'active':''}" onclick="selBudCat('${c.id}')">
      ${c.icon} ${c.name}
    </button>`).join('');
}
function selBudCat(id){ budCat=id; renderBudCatGrid(); }
function saveBudget(){
  const lim=parseFloat(document.getElementById('budgetAmt').value)||0;
  if(lim<=0){ toast('ضيف مبلغ صحيح','err'); return; }
  const ex=buds.find(b=>b.categoryId===budCat);
  if(ex) ex.limit=lim; else buds.push({categoryId:budCat,limit:lim,spent:0});
  save(); renderBudgets();
  document.getElementById('budgetOverlay').classList.remove('open');
  document.body.style.overflow='';
  document.getElementById('budgetAmt').value='';
  toast('تم حفظ الميزانية 🎯','ok');
}

/* ─── CONFIRM ─── */
function showConfirm(){ document.getElementById('confirmOverlay').classList.add('open'); }
function closeConfirm(){ document.getElementById('confirmOverlay').classList.remove('open'); }
function clearAll(){
  localStorage.removeItem(SK.tx); localStorage.removeItem(SK.bud);
  txs=[]; buds=[]; renderAll(); closeConfirm(); toast('تم مسح كل البيانات','ok');
}

/* ─── EXPORT ─── */
function exportData(){
  const blob=new Blob([JSON.stringify({txs,buds,date:new Date()},null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`wallet-${new Date().toISOString().split('T')[0]}.json`;
  a.click(); toast('تم التصدير 📁','ok');
}

/* ─── TOAST ─── */
function toast(msg,type='ok'){
  const el=document.getElementById('toast');
  el.textContent=msg; el.className='toast '+type+' show';
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'),3000);
}

/* ─── UTIL ─── */
function numOnly(inp){ inp.value=inp.value.replace(/[^\d.]/g,''); }

/* ─── TABS ─── */
document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
  });
});

/* ─── INIT ─── */
load(); updateDate(); renderAll(); renderCatGrid();
</script>
</body>
