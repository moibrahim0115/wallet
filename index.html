<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Fulus — محفظتي</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080a0f;--s1:#0d1018;--s2:#12151f;--s3:#181c28;
  --border:rgba(255,255,255,.07);--border2:rgba(255,255,255,.12);
  --gold:#c9a84c;--gold2:#e8c870;
  --blue:#4f8eff;--blue2:#7bb3ff;
  --green:#30d158;--red:#ff453a;--amber:#ffd60a;
  --t1:#ffffff;--t2:#ebebf5cc;--t3:#ebebf599;--t4:#ebebf54d;
  --r:22px;--rp:100px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{min-height:100%;background:var(--bg);color:var(--t1);font-family:'Cairo',sans-serif;overflow-x:hidden;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ambient */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.45}
.orb1{width:500px;height:500px;top:-150px;right:-100px;background:radial-gradient(circle,rgba(79,142,255,.35) 0%,transparent 70%);animation:o1 18s ease-in-out infinite}
.orb2{width:400px;height:400px;bottom:-100px;left:-80px;background:radial-gradient(circle,rgba(201,168,76,.25) 0%,transparent 70%);animation:o2 22s ease-in-out infinite}
.orb3{width:300px;height:300px;top:40%;left:30%;background:radial-gradient(circle,rgba(48,209,88,.12) 0%,transparent 70%);animation:o3 28s ease-in-out infinite}
@keyframes o1{0%,100%{transform:translate(0,0)}33%{transform:translate(-40px,30px)}66%{transform:translate(20px,-20px)}}
@keyframes o2{0%,100%{transform:translate(0,0)}33%{transform:translate(30px,-40px)}66%{transform:translate(-20px,20px)}}
@keyframes o3{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,-30px)}}
body::after{content:'';position:fixed;inset:0;z-index:1;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");opacity:.018}

#app{position:relative;z-index:2;max-width:420px;margin:0 auto;min-height:100svh;padding-bottom:100px}

/* header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:52px 22px 0;animation:fd .7s cubic-bezier(.16,1,.3,1) both}
.hdr-l{display:flex;align-items:center;gap:12px}
.app-ico{width:42px;height:42px;border-radius:13px;background:linear-gradient(145deg,#1a2340,#0d1530);border:1px solid rgba(79,142,255,.3);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(79,142,255,.25),inset 0 1px 0 rgba(255,255,255,.08)}
.app-nm{font-size:20px;font-weight:800;letter-spacing:-.5px}
.app-nm span{color:var(--gold2)}
.hdr-date{text-align:left;font-size:13px;font-weight:500;color:var(--t3);line-height:1.3}
.hdr-date strong{display:block;color:var(--t2);font-size:14px;font-weight:700}

/* hero card */
.hero{margin:22px 16px 0;border-radius:28px;padding:26px 24px 22px;position:relative;overflow:hidden;background:linear-gradient(160deg,#12192f 0%,#0c1020 40%,#141028 100%);border:1px solid rgba(79,142,255,.2);box-shadow:0 32px 64px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.04),inset 0 1px 0 rgba(255,255,255,.07);animation:hu .8s .1s cubic-bezier(.16,1,.3,1) both}
.hero::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,rgba(79,142,255,.5) 40%,rgba(201,168,76,.4) 70%,transparent 100%)}
.hero::after{content:'';position:absolute;top:-80px;right:-60px;width:280px;height:280px;border-radius:50%;background:radial-gradient(circle,rgba(79,142,255,.12) 0%,transparent 65%);pointer-events:none}
.hero-chip{display:flex;align-items:center;gap:8px;margin-bottom:22px}
.chip-dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);animation:pulse 2s infinite}
.chip-lbl{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:1.2px;text-transform:uppercase}
.bal-sym{font-size:18px;font-weight:300;color:var(--t3);vertical-align:top;margin-top:11px;display:inline-block;margin-left:5px}
.bal-num{font-size:50px;font-weight:800;letter-spacing:-3px;line-height:1;background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.75) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.bal-tag{display:inline-flex;align-items:center;gap:5px;margin-top:7px;border-radius:var(--rp);padding:4px 12px;font-size:11px;font-weight:700;transition:all .3s}
.hero-div{height:1px;background:var(--border);margin:18px 0}
.hero-stats{display:grid;grid-template-columns:1fr 1fr;gap:0}
.hs{display:flex;align-items:center;gap:11px}
.hs+.hs{border-right:1px solid var(--border);padding-right:14px}
.hs-ico{width:34px;height:34px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hs-ico.i{background:rgba(48,209,88,.12)}
.hs-ico.e{background:rgba(255,69,58,.12)}
.hs-lbl{font-size:11px;color:var(--t4);font-weight:500;margin-bottom:2px}
.hs-val{font-size:16px;font-weight:800;letter-spacing:-.5px}
.hs-val.i{color:var(--green)}.hs-val.e{color:var(--red)}

/* qa */
.qa{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin:14px 16px 0;animation:fu .6s .25s cubic-bezier(.16,1,.3,1) both}
.qb{display:flex;flex-direction:column;align-items:center;gap:7px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r);padding:15px 8px 13px;cursor:pointer;transition:all .2s cubic-bezier(.16,1,.3,1);font-family:'Cairo',sans-serif;color:var(--t3);font-size:11px;font-weight:600}
.qb:hover{background:var(--s3);border-color:var(--border2);color:var(--t1);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.4)}
.qb:active{transform:scale(.96) translateY(0)}
.qi{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;transition:transform .2s}
.qb:hover .qi{transform:scale(1.1)}
.qi.a{background:rgba(48,209,88,.15)}.qi.b{background:rgba(255,69,58,.15)}.qi.c{background:rgba(201,168,76,.15)}.qi.d{background:rgba(79,142,255,.15)}

/* segment */
.seg{margin:18px 16px 0;background:var(--s1);border:1px solid var(--border);border-radius:var(--rp);padding:4px;display:grid;grid-template-columns:repeat(3,1fr);gap:2px;animation:fu .6s .3s cubic-bezier(.16,1,.3,1) both}
.sgt{background:transparent;border:none;color:var(--t4);padding:9px 4px;border-radius:var(--rp);cursor:pointer;font-family:'Cairo',sans-serif;font-size:12px;font-weight:700;transition:all .25s cubic-bezier(.16,1,.3,1);display:flex;align-items:center;justify-content:center;gap:5px}
.sgt.active{background:var(--s3);color:var(--t1);box-shadow:0 2px 12px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06)}
.sgt svg{transition:transform .2s}
.sgt.active svg{transform:scale(1.1)}

/* sections */
.sh{display:flex;align-items:center;justify-content:space-between;padding:18px 22px 10px}
.st{font-size:15px;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
.std{width:5px;height:5px;border-radius:50%;background:var(--blue);box-shadow:0 0 8px var(--blue)}
.sb{background:var(--s2);border:1px solid var(--border);color:var(--t3);font-size:11px;font-weight:700;padding:3px 10px;border-radius:var(--rp)}

/* filters */
.flt{display:flex;gap:7px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.flt::-webkit-scrollbar{display:none}
.fp{background:var(--s1);border:1px solid var(--border);color:var(--t3);font-size:11px;font-weight:700;padding:6px 14px;border-radius:var(--rp);cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:'Cairo',sans-serif;transition:all .2s}
.fp:hover{border-color:var(--border2);color:var(--t2)}
.fp.active{background:rgba(79,142,255,.12);border-color:rgba(79,142,255,.4);color:var(--blue2)}

/* panels */
.tp{display:none}
.tp.active{display:block;animation:pi .35s cubic-bezier(.16,1,.3,1) both}

/* tx */
.txl{padding:0 16px;display:flex;flex-direction:column;gap:8px}
.txi{background:var(--s2);border:1px solid var(--border);border-radius:18px;padding:14px;display:flex;align-items:center;gap:12px;transition:all .22s cubic-bezier(.16,1,.3,1);animation:si .4s cubic-bezier(.16,1,.3,1) both;position:relative;overflow:hidden}
.txi::before{content:'';position:absolute;inset:0;border-radius:inherit;background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 50%);pointer-events:none}
.txi:hover{background:var(--s3);border-color:var(--border2);transform:translateX(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.tx-ico{width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.txb{flex:1;min-width:0}
.txn{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.txm{display:flex;align-items:center;gap:6px}
.tct{font-size:10px;font-weight:700;color:var(--t4);background:var(--s3);border:1px solid var(--border);border-radius:var(--rp);padding:2px 8px}
.ttime{font-size:10px;color:var(--t4)}
.txr{text-align:left;flex-shrink:0;display:flex;align-items:center;gap:8px}
.txa{font-size:16px;font-weight:800;letter-spacing:-.3px}
.txa.i{color:var(--green)}.txa.e{color:var(--t1)}
.txd{width:30px;height:30px;border-radius:9px;background:transparent;border:none;cursor:pointer;color:var(--t4);display:flex;align-items:center;justify-content:center;transition:all .18s;opacity:0}
.tx-actions{display:flex;gap:4px;align-items:center}
.txi:hover .txd{opacity:1}
.txd:hover{background:rgba(255,69,58,.15);color:var(--red)}
.txd-edit:hover{background:rgba(201,168,76,.15)!important;color:var(--gold2)!important}
/* Always show on touch devices */
@media (hover:none),(pointer:coarse){
  .txd{opacity:1}
  .txd{background:var(--s3);border:1px solid var(--border)}
  .txd-edit{color:var(--gold2)!important}
  .txd:not(.txd-edit){color:var(--red)!important}
}

/* empty */
.emp{text-align:center;padding:52px 24px;animation:fu .5s cubic-bezier(.16,1,.3,1) both}
.emp-ico{width:76px;height:76px;border-radius:24px;margin:0 auto 18px;background:var(--s2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center}
.emp h3{font-size:17px;font-weight:800;margin-bottom:8px}
.emp p{font-size:13px;color:var(--t4);line-height:1.6}

/* budgets */
.budl{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.budc{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:17px 17px 15px;position:relative;overflow:hidden;animation:si .4s cubic-bezier(.16,1,.3,1) both;transition:all .2s}
.budc:hover{border-color:var(--border2)}
.budc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 50%);pointer-events:none}
.bud-top{display:flex;align-items:center;gap:11px;margin-bottom:15px}
.bud-ico{width:38px;height:38px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bud-nm{font-size:14px;font-weight:800;flex:1}
.bud-pct{font-size:13px;font-weight:800;padding:3px 10px;border-radius:var(--rp)}
.bud-tr{height:5px;background:rgba(255,255,255,.07);border-radius:3px;margin-bottom:11px;overflow:visible;position:relative}
.bud-fl{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.16,1,.3,1);position:relative}
.bud-fl::after{content:'';position:absolute;right:-1px;top:-3px;width:11px;height:11px;border-radius:50%;background:inherit;box-shadow:0 0 8px currentColor}
.bud-bt{display:flex;justify-content:space-between;font-size:12px;color:var(--t4)}
.bud-bt strong{color:var(--t2);font-weight:700}
.bud-ov{margin-top:10px;background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.25);border-radius:10px;padding:8px 12px;font-size:12px;color:var(--red);font-weight:700;display:flex;align-items:center;gap:7px}
.budd{width:27px;height:27px;border-radius:9px;background:transparent;border:none;cursor:pointer;color:var(--t4);display:flex;align-items:center;justify-content:center;transition:all .18s}
.budd:hover{background:rgba(255,69,58,.12);color:var(--red)}

/* stats */
.sw{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.sr2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sc{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:18px;animation:si .4s cubic-bezier(.16,1,.3,1) both;position:relative;overflow:hidden}
.sc::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.02) 0%,transparent 60%);pointer-events:none}
.si2{width:36px;height:36px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:12px}
.sl{font-size:11px;font-weight:600;color:var(--t4);letter-spacing:.3px;margin-bottom:4px}
.sv{font-size:26px;font-weight:900;letter-spacing:-1.5px;line-height:1;margin-bottom:3px}
.ss{font-size:11px;color:var(--t4)}
.cc{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:18px 18px 14px;animation:si .5s .1s cubic-bezier(.16,1,.3,1) both}
.ct{font-size:13px;font-weight:800;margin-bottom:14px;color:var(--t2)}
.cb{display:flex;align-items:flex-end;gap:7px;height:88px}
.col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px}
.bar{width:100%;border-radius:6px 6px 0 0;min-height:4px;transition:height 1s cubic-bezier(.16,1,.3,1)}
.barlbl{font-size:9px;color:var(--t4);font-weight:600}
.tc{background:var(--s2);border:1px solid var(--border);border-radius:20px;padding:18px;animation:si .5s .15s cubic-bezier(.16,1,.3,1) both}
.tcr{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.tcr:last-child{margin-bottom:0}
.tci{width:30px;height:30px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tcn{font-size:12px;font-weight:700;flex:1}
.tctr{flex:2;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.tcf{height:100%;border-radius:2px;transition:width 1s cubic-bezier(.16,1,.3,1)}
.tca{font-size:12px;font-weight:800;min-width:60px;text-align:left}

/* nav */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:420px;background:rgba(13,16,24,.88);backdrop-filter:blur(24px) saturate(1.4);border-top:1px solid var(--border);padding:10px 20px 28px;display:flex;justify-content:space-around;align-items:center;z-index:100}
.nb{display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--t4);font-family:'Cairo',sans-serif;font-size:10px;font-weight:700;padding:6px 16px;border-radius:14px;transition:all .2s}
.nb.active{color:var(--blue2)}
.nb:hover:not(.active){color:var(--t2)}
.ni{width:24px;height:24px;display:flex;align-items:center;justify-content:center}
.nb.active .ni svg{filter:drop-shadow(0 0 6px var(--blue))}

/* fab */
.fab{position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateX(146px);width:52px;height:52px;border-radius:50%;background:linear-gradient(145deg,var(--blue),#2c5ee8);border:none;cursor:pointer;z-index:101;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 28px rgba(79,142,255,.5),0 0 0 1px rgba(255,255,255,.1);transition:all .25s cubic-bezier(.16,1,.3,1)}
.fab:hover{transform:translateX(-50%) translateX(146px) scale(1.1);box-shadow:0 12px 36px rgba(79,142,255,.65)}
.fab:active{transform:translateX(-50%) translateX(146px) scale(.95)}

/* overlay */
.ov{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.65);backdrop-filter:blur(12px);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s}
.ov.open{opacity:1;pointer-events:all}
.sht{background:var(--s1);border:1px solid var(--border);border-radius:32px 32px 0 0;width:100%;max-width:420px;padding:14px 22px 44px;transform:translateY(100%);transition:transform .45s cubic-bezier(.16,1,.3,1);max-height:90svh;overflow-y:auto;box-shadow:0 -24px 60px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06)}
.ov.open .sht{transform:translateY(0)}
.hdl{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 22px;display:block}
.shtit{font-size:20px;font-weight:900;letter-spacing:-.5px;margin-bottom:22px;display:flex;align-items:center;gap:10px}
/* confirm */
.cfm{background:var(--s1);border:1px solid var(--border);border-radius:28px;padding:30px 24px;width:calc(100% - 40px);max-width:340px;margin:auto;align-self:center;transform:scale(.88) translateY(24px);transition:all .35s cubic-bezier(.16,1,.3,1);box-shadow:0 40px 80px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.06)}
.ov.open .cfm{transform:scale(1) translateY(0)}
.cfm-ico{text-align:center;margin-bottom:14px}
.cfm-ico-w{width:64px;height:64px;border-radius:20px;margin:0 auto;background:rgba(255,69,58,.1);border:1px solid rgba(255,69,58,.2);display:flex;align-items:center;justify-content:center}
.cfm h3{font-size:18px;font-weight:900;text-align:center;margin-bottom:8px}
.cfm p{font-size:13px;color:var(--t3);text-align:center;margin-bottom:22px;line-height:1.6}
.cfm-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* type toggle */
.ttog{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.tbt{padding:13px;border-radius:16px;border:1px solid var(--border);background:var(--s2);color:var(--t3);cursor:pointer;font-family:'Cairo',sans-serif;font-size:13px;font-weight:800;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.tbt:hover{border-color:var(--border2)}
.tbt.i.active{background:rgba(48,209,88,.12);border-color:rgba(48,209,88,.35);color:var(--green)}
.tbt.e.active{background:rgba(255,69,58,.12);border-color:rgba(255,69,58,.35);color:var(--red)}

/* form */
.fg{margin-bottom:16px}
.fl{font-size:12px;font-weight:700;color:var(--t3);letter-spacing:.3px;margin-bottom:8px;display:block}
.fi{width:100%;background:var(--s2);border:1px solid var(--border);border-radius:16px;padding:15px 18px;color:var(--t1);font-family:'Cairo',sans-serif;font-size:16px;font-weight:600;outline:none;transition:all .2s}
.fi:focus{border-color:rgba(79,142,255,.5);box-shadow:0 0 0 3px rgba(79,142,255,.1)}
.fi::placeholder{color:var(--t4);font-weight:400}
.fi-lg{font-size:32px;font-weight:800;letter-spacing:-1px;text-align:center;padding:18px}

/* cat grid */
.cg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.cc2{background:var(--s2);border:1px solid var(--border);border-radius:14px;padding:11px 6px;cursor:pointer;color:var(--t3);font-family:'Cairo',sans-serif;font-size:11px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:6px;transition:all .18s}
.cc2:hover{border-color:var(--border2);color:var(--t2)}
.cc2.active{border-color:rgba(79,142,255,.4);background:rgba(79,142,255,.1);color:var(--blue2)}
.ci2{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center}

/* btns */
.bp{width:100%;padding:17px;border-radius:16px;border:none;background:linear-gradient(145deg,var(--blue),#2c5ee8);color:#fff;font-family:'Cairo',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;box-shadow:0 6px 20px rgba(79,142,255,.35);margin-top:8px}
.bp:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(79,142,255,.45)}
.bp:active{transform:scale(.97)}
.bg2{padding:15px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--t2);cursor:pointer;font-family:'Cairo',sans-serif;font-size:14px;font-weight:700;transition:all .18s;width:100%}
.bg2:hover{background:var(--s2)}
.bdn{background:rgba(255,69,58,.15)!important;border:1px solid rgba(255,69,58,.3)!important;color:var(--red)!important;box-shadow:none!important}
.bdn:hover{background:rgba(255,69,58,.25)!important}

/* toast */
.tst{position:fixed;bottom:108px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--s2);border:1px solid var(--border);border-radius:16px;padding:12px 20px;font-size:13px;font-weight:700;white-space:nowrap;z-index:999;opacity:0;transition:all .3s cubic-bezier(.16,1,.3,1);pointer-events:none;box-shadow:0 12px 32px rgba(0,0,0,.4);display:flex;align-items:center;gap:8px}
.tst.show{opacity:1;transform:translateX(-50%) translateY(0)}
.tst.ok{border-color:rgba(48,209,88,.3)}.tst.err{border-color:rgba(255,69,58,.3)}.tst.warn{border-color:rgba(255,214,10,.3)}
.td{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.tst.ok .td{background:var(--green)}.tst.err .td{background:var(--red)}.tst.warn .td{background:var(--amber)}

/* animations */
@keyframes fd{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fu{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
@keyframes hu{from{opacity:0;transform:translateY(22px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes pi{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes si{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.85)}}

.txi:nth-child(1){animation-delay:.00s}.txi:nth-child(2){animation-delay:.04s}.txi:nth-child(3){animation-delay:.08s}
.txi:nth-child(4){animation-delay:.12s}.txi:nth-child(5){animation-delay:.16s}.txi:nth-child(6){animation-delay:.20s}
</style>
</head>

  {id:'food',         name:'طعام',     icon:'I-food',         type:'expense', color:'#ff6b6b'},
  {id:'transport',    name:'مواصلات',  icon:'I-transport',    type:'expense', color:'#ffa94d'},
  {id:'shopping',     name:'تسوق',     icon:'I-shopping',     type:'expense', color:'#da77f2'},
  {id:'bills',        name:'فواتير',   icon:'I-bills',        type:'expense', color:'#ffd43b'},
  {id:'health',       name:'صحة',      icon:'I-health',       type:'expense', color:'#f783ac'},
  {id:'entertainment',name:'ترفيه',    icon:'I-entertainment',type:'expense', color:'#74c0fc'},
  {id:'education',    name:'تعليم',    icon:'I-education',    type:'expense', color:'#a9e34b'},
  {id:'sports',       name:'رياضة',    icon:'I-sports',       type:'expense', color:'#63e6be'},
  {id:'rent',         name:'إيجار',    icon:'I-rent',         type:'expense', color:'#e599f7'},
  {id:'salary',       name:'راتب',     icon:'I-salary',       type:'income',  color:'#30d158'},
  {id:'freelance',    name:'فريلانس',  icon:'I-freelance',    type:'income',  color:'#74c0fc'},
  {id:'invest',       name:'استثمار',  icon:'I-invest',       type:'income',  color:'#ffd60a'},
  {id:'gift',         name:'هدية',     icon:'I-gift',         type:'income',  color:'#f783ac'},
  {id:'other',        name:'أخرى',     icon:'I-other',        type:'both',    color:'#adb5bd'},
];

function ico(id,color,sz=18){return `<svg width="${sz}" height="${sz}" style="color:${color}" fill="none"><use href="#${id}"/></svg>`}

function save(){try{localStorage.setItem(SK.tx,JSON.stringify(txs));localStorage.setItem(SK.bud,JSON.stringify(buds))}catch(e){}}
function load(){try{txs=JSON.parse(localStorage.getItem(SK.tx)||'[]');buds=JSON.parse(localStorage.getItem(SK.bud)||'[]')}catch(e){txs=[];buds=[]}}

function fmt(n){return Number(n||0).toLocaleString('ar-EG',{maximumFractionDigits:0})}

function updateDate(){
  const d=new Date();
  const dn=['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
  const mn=['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
  document.getElementById('dayName').textContent=dn[d.getDay()];
  document.getElementById('dateStr').textContent=`${d.getDate()} ${mn[d.getMonth()]} ${d.getFullYear()}`;
}

function renderAll(){renderBalance();renderTxList();renderBudgets();renderStats()}

function renderBalance(){
  const inc=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const bal=inc-exp;
  document.getElementById('totalBalance').textContent=fmt(Math.abs(bal));
  document.getElementById('totalInc').textContent=fmt(inc);
  document.getElementById('totalExp').textContent=fmt(exp);
  const tag=document.getElementById('balTag');
  if(bal<0){
    Object.assign(tag.style,{background:'rgba(255,69,58,.12)',borderColor:'rgba(255,69,58,.25)',color:'var(--red)',border:'1px solid'});
    tag.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="currentColor" stroke-width="2" fill="none"/></svg> رصيد سالب`;
  } else if(!txs.length){
    Object.assign(tag.style,{background:'rgba(255,255,255,.05)',borderColor:'rgba(255,255,255,.08)',color:'var(--t4)',border:'1px solid'});
    tag.innerHTML='لا توجد معاملات بعد';
  } else {
    Object.assign(tag.style,{background:'rgba(48,209,88,.12)',borderColor:'rgba(48,209,88,.2)',color:'var(--green)',border:'1px solid'});
    tag.innerHTML=`<svg width="11" height="11" viewBox="0 0 24 24" fill="none"><polyline points="20 6 9 17 4 12" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg> رصيد إيجابي`;
  }
}

function renderTxList(){
  const cats=[...new Set(txs.map(t=>t.categoryId))];
  document.getElementById('filterRow').innerHTML=
    `<button class="fp ${AF==='all'?'active':''}" onclick="setF('all')">الكل (${txs.length})</button>`
    +cats.map(cid=>{const c=CATS.find(x=>x.id===cid)||{name:cid};const n=txs.filter(t=>t.categoryId===cid).length;
      return `<button class="fp ${AF===cid?'active':''}" onclick="setF('${cid}')">${c.name} ${n}</button>`;
    }).join('');
  const filtered=AF==='all'?txs:txs.filter(t=>t.categoryId===AF);
  document.getElementById('txCount').textContent=filtered.length;
  const list=document.getElementById('txList');
  if(!filtered.length){
    list.innerHTML=`<div class="emp"><div class="emp-ico"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" style="color:var(--t4)"><rect x="2" y="5" width="20" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><line x1="2" y1="10" x2="22" y2="10" stroke="currentColor" stroke-width="1.5"/></svg></div><h3>لا توجد معاملات</h3><p>ابدأ بإضافة أول معاملة<br>لتتبع أموالك بذكاء</p></div>`;
    return;
  }
  list.innerHTML=[...filtered].reverse().map((tx,i)=>{
    const cat=CATS.find(c=>c.id===tx.categoryId)||CATS[13];
    const d=new Date(tx.date);
    const ts=d.toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
    const ds=d.toLocaleDateString('ar-EG',{month:'short',day:'numeric'});
    return `<div class="txi" style="animation-delay:${i*.045}s">
      <div class="tx-ico" style="background:${cat.color}18">${ico(cat.icon,cat.color,21)}</div>
      <div class="txb">
        <div class="txn">${tx.note||cat.name}</div>
        <div class="txm"><span class="tct">${cat.name}</span><span class="ttime">${ds} · ${ts}</span></div>
      </div>
      <div class="txr">
        <div class="txa ${tx.type==='income'?'i':'e'}" style="color:${tx.type==='income'?'var(--green)':'var(--t1)'}">
          ${tx.type==='income'?'+':'-'}${fmt(tx.amount)}
        </div>
        <div class="tx-actions">
          <button class="txd txd-edit" onclick="openEdit(${tx.id})">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button class="txd" onclick="delTx(${tx.id})">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setF(f){AF=f;renderTxList()}
function delTx(id){txs=txs.filter(t=>t.id!==id);save();renderAll();toast('تم الحذف','warn')}

function openEdit(id){
  const tx=txs.find(t=>t.id===id);if(!tx)return;
  editId=id;editType=tx.type;editCat=tx.categoryId;
  document.getElementById('editTypeInc').classList.toggle('active',editType==='income');
  document.getElementById('editTypeExp').classList.toggle('active',editType==='expense');
  document.getElementById('editAmt').value=tx.amount;
  document.getElementById('editNote').value=tx.note||'';
  renderEditCatGrid();
  document.getElementById('editOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function setEditType(t){editType=t;document.getElementById('editTypeInc').classList.toggle('active',t==='income');document.getElementById('editTypeExp').classList.toggle('active',t==='expense');editCat=t==='income'?'salary':'food';renderEditCatGrid()}
function renderEditCatGrid(){document.getElementById('editCatGrid').innerHTML=CATS.filter(c=>c.type===editType||c.type==='both').map(c=>`<button class="cc2 ${c.id===editCat?'active':''}" onclick="sec('${c.id}')"><div class="ci2" style="background:${c.color}18">${ico(c.icon,c.color,17)}</div>${c.name}</button>`).join('')}
function sec(id){editCat=id;renderEditCatGrid()}
function saveEdit(){
  const amt=parseFloat(document.getElementById('editAmt').value)||0;
  if(amt<=0){toast('أدخل مبلغاً صحيحاً','err');return}
  const note=document.getElementById('editNote').value.trim();
  const tx=txs.find(t=>t.id===editId);if(!tx)return;
  tx.amount=amt;tx.type=editType;tx.categoryId=editCat;tx.note=note;
  save();renderAll();cls('editOverlay');toast('تم تعديل المعاملة','ok');
}

function renderBudgets(){
  const bl=document.getElementById('budList');
  if(!buds.length){
    bl.innerHTML=`<div class="emp"><div class="emp-ico"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" style="color:var(--t4)"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.5"/><path d="M12 6v6l4 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div><h3>لا توجد ميزانيات</h3><p>أضف ميزانية للتحكم<br>في مصروفاتك الشهرية</p></div>`;
    return;
  }
  bl.innerHTML=buds.map((b,i)=>{
    const cat=CATS.find(c=>c.id===b.categoryId)||CATS[13];
    const spent=txs.filter(t=>t.type==='expense'&&t.categoryId===b.categoryId).reduce((s,t)=>s+t.amount,0);
    const pct=Math.min((spent/b.limit)*100,100);
    const rem=b.limit-spent;
    const col=pct>=100?'var(--red)':pct>=75?'var(--amber)':'var(--green)';
    return `<div class="budc" style="animation-delay:${i*.07}s">
      <div class="bud-top">
        <div class="bud-ico" style="background:${cat.color}18">${ico(cat.icon,cat.color,19)}</div>
        <div class="bud-nm">${cat.name}</div>
        <div class="bud-pct" style="color:${col};background:${col}15;border:1px solid ${col}30">${Math.round(pct)}%</div>
        <button class="budd" onclick="delBud('${b.categoryId}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><line x1="18" y1="6" x2="6" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="6" y1="6" x2="18" y2="18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="bud-tr"><div class="bud-fl" style="width:${pct}%;background:linear-gradient(90deg,${col},${col}99)"></div></div>
      <div class="bud-bt"><span>صُرف: <strong style="color:${col}">${fmt(spent)} ج.م</strong></span><span>الحد: <strong>${fmt(b.limit)} ج.م</strong></span></div>
      ${rem<0?`<div class="bud-ov"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" stroke="currentColor" stroke-width="2"/></svg>تجاوزت بـ ${fmt(Math.abs(rem))} ج.م</div>`:''}
    </div>`;
  }).join('');
}

function delBud(cid){buds=buds.filter(b=>b.categoryId!==cid);save();renderBudgets();toast('تم حذف الميزانية','warn')}

function renderStats(){
  const sw=document.getElementById('statsWrap');
  const inc=txs.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=txs.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const sr=inc>0?Math.round(((inc-exp)/inc)*100):0;
  const et=txs.filter(t=>t.type==='expense');
  const avg=et.length?Math.round(exp/et.length):0;
  const days7=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    const ds=d.toDateString();
    const ln=['أح','إث','ثل','أر','خم','جم','سب'];
    days7.push({l:ln[d.getDay()],v:txs.filter(t=>t.type==='expense'&&new Date(t.date).toDateString()===ds).reduce((s,t)=>s+t.amount,0)});
  }
  const mx=Math.max(...days7.map(d=>d.v),1);
  const top=CATS.filter(c=>c.type==='expense').map(c=>({cat:c,total:txs.filter(t=>t.categoryId===c.id&&t.type==='expense').reduce((s,t)=>s+t.amount,0)})).filter(x=>x.total>0).sort((a,b)=>b.total-a.total).slice(0,4);
  sw.innerHTML=`
    <div class="sr2">
      <div class="sc"><div class="si2" style="background:rgba(48,209,88,.12)">${ico('I-invest','var(--green)',17)}</div><div class="sl">معدل الادخار</div><div class="sv" style="color:${sr>=0?'var(--green)':'var(--red)'}">${sr}%</div><div class="ss">${sr>=0?'نسبة صحية ✓':'مصروف > دخل'}</div></div>
      <div class="sc"><div class="si2" style="background:rgba(201,168,76,.12)">${ico('I-bills','var(--gold2)',17)}</div><div class="sl">متوسط المصروف</div><div class="sv" style="color:var(--gold2);font-size:21px">${fmt(avg)}</div><div class="ss">جنيه / معاملة</div></div>
    </div>
    <div class="sr2">
      <div class="sc"><div class="si2" style="background:rgba(79,142,255,.12)">${ico('I-salary','var(--blue2)',17)}</div><div class="sl">معاملات</div><div class="sv" style="color:var(--blue2)">${txs.length}</div><div class="ss">${txs.filter(t=>t.type==='income').length} دخل · ${et.length} مصروف</div></div>
      <div class="sc"><div class="si2" style="background:rgba(167,139,250,.12)">${ico('I-other','#c084fc',17)}</div><div class="sl">ميزانيات</div><div class="sv" style="color:#c084fc">${buds.length}</div><div class="ss">فئة مراقبة</div></div>
    </div>
    ${days7.some(d=>d.v>0)?`<div class="cc"><div class="ct">المصروف — آخر ٧ أيام</div><div class="cb">${days7.map((d,i)=>`<div class="col"><div class="bar" style="height:${(d.v/mx)*80+4}px;background:${d.v>0?'linear-gradient(to top,var(--blue),var(--blue2))':'var(--s3)'};opacity:${d.v>0?1:.35};animation-delay:${i*.06}s"></div><div class="barlbl">${d.l}</div></div>`).join('')}</div></div>`:''}
    ${top.length?`<div class="tc"><div style="font-size:13px;font-weight:800;margin-bottom:14px;color:var(--t2)">أعلى فئات الإنفاق</div>${top.map(({cat,total})=>`<div class="tcr"><div class="tci" style="background:${cat.color}18">${ico(cat.icon,cat.color,15)}</div><div class="tcn">${cat.name}</div><div class="tctr"><div class="tcf" style="width:${(total/top[0].total)*100}%;background:${cat.color}"></div></div><div class="tca" style="color:${cat.color}">${fmt(total)}</div></div>`).join('')}</div>`:''}
  `;
}

function openSheet(type,sub){
  if(type==='add'){
    curType=sub||'expense';
    document.getElementById('typeInc').classList.toggle('active',curType==='income');
    document.getElementById('typeExp').classList.toggle('active',curType==='expense');
    selCat=curType==='income'?'salary':'food';
    renderCatGrid();
    document.getElementById('txAmt').value='';
    document.getElementById('txNote').value='';
    document.getElementById('addOverlay').classList.add('open');
  } else {
    budCat='food';renderBudCatGrid();
    document.getElementById('budgetAmt').value='';
    document.getElementById('budgetOverlay').classList.add('open');
  }
  document.body.style.overflow='hidden';
}
function cls(id,e){if(!e||e.target===document.getElementById(id)){document.getElementById(id).classList.remove('open');document.body.style.overflow=''}}
function setType(t){curType=t;document.getElementById('typeInc').classList.toggle('active',t==='income');document.getElementById('typeExp').classList.toggle('active',t==='expense');selCat=t==='income'?'salary':'food';renderCatGrid()}
function renderCatGrid(){document.getElementById('catGrid').innerHTML=CATS.filter(c=>c.type===curType||c.type==='both').map(c=>`<button class="cc2 ${c.id===selCat?'active':''}" onclick="sc2('${c.id}')"><div class="ci2" style="background:${c.color}18">${ico(c.icon,c.color,17)}</div>${c.name}</button>`).join('')}
function sc2(id){selCat=id;renderCatGrid()}
function saveTx(){
  const amt=parseFloat(document.getElementById('txAmt').value)||0;
  if(amt<=0){toast('أدخل مبلغاً صحيحاً','err');return}
  const note=document.getElementById('txNote').value.trim();
  txs.push({id:Date.now(),type:curType,amount:amt,categoryId:selCat,note,date:new Date().toISOString()});
  save();renderAll();cls('addOverlay');
  toast(curType==='income'?'تم إضافة الدخل':'تم إضافة المصروف','ok');
  if(curType==='expense'){const b=buds.find(x=>x.categoryId===selCat);if(b){const sp=txs.filter(t=>t.type==='expense'&&t.categoryId===selCat).reduce((s,t)=>s+t.amount,0);const p=(sp/b.limit)*100;if(p>=100)setTimeout(()=>toast('تجاوزت الميزانية!','err'),3200);else if(p>=80)setTimeout(()=>toast('اقتربت من حد الميزانية','warn'),3200)}}
}
function renderBudCatGrid(){document.getElementById('budgetCatGrid').innerHTML=CATS.filter(c=>c.type==='expense').map(c=>`<button class="cc2 ${c.id===budCat?'active':''}" onclick="sbc('${c.id}')"><div class="ci2" style="background:${c.color}18">${ico(c.icon,c.color,17)}</div>${c.name}</button>`).join('')}
function sbc(id){budCat=id;renderBudCatGrid()}
function saveBudget(){
  const lim=parseFloat(document.getElementById('budgetAmt').value)||0;
  if(lim<=0){toast('أدخل مبلغاً صحيحاً','err');return}
  const ex=buds.find(b=>b.categoryId===budCat);if(ex)ex.limit=lim;else buds.push({categoryId:budCat,limit:lim});
  save();renderBudgets();cls('budgetOverlay');toast('تم حفظ الميزانية','ok');
}
function showConfirm(){document.getElementById('confirmOverlay').classList.add('open');document.body.style.overflow='hidden'}
function clearAll(){localStorage.removeItem(SK.tx);localStorage.removeItem(SK.bud);txs=[];buds=[];AF='all';renderAll();cls('confirmOverlay');toast('تم مسح البيانات','ok')}
function exportData(){const b=new Blob([JSON.stringify({txs,buds,date:new Date()},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`fulus-${new Date().toISOString().split('T')[0]}.json`;a.click();toast('تم التصدير','ok')}
function toast(msg,type='ok'){const el=document.getElementById('toast');document.getElementById('tmsg').textContent=msg;el.className='tst '+type+' show';clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),3000)}
function snav(tab,btn){document.querySelectorAll('.sgt').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nb').forEach(b=>b.classList.remove('active'));document.querySelector(`[data-tab="${tab}"]`)?.classList.add('active');document.getElementById('panel-'+tab).classList.add('active');if(btn)btn.classList.add('active')}
document.querySelectorAll('.sgt').forEach(btn=>btn.addEventListener('click',()=>{document.querySelectorAll('.sgt').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.tp').forEach(p=>p.classList.remove('active'));btn.classList.add('active');document.getElementById('panel-'+btn.dataset.tab).classList.add('active')}));
function numOnly(inp){inp.value=inp.value.replace(/[^\d.]/g,'')}
load();updateDate();renderAll();renderCatGrid();
</script>
</body>
</html>
